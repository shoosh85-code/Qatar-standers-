name = "qatarspec-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
# Set secrets via: wrangler secret put OPENROUTER_API_KEY
# Set secrets via: wrangler secret put GEMINI_API_KEY

[routes]
pattern = "qatar-standers.vercel.app/api/*"
zone_name = "your-domain.com"
