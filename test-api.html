<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>اختبار API</title>
<style>
body { font-family: Arial; padding: 30px; background: #f5f5f5; }
button { background: #8D1B3D; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 8px; cursor: pointer; }
#result { margin-top: 20px; padding: 16px; background: white; border-radius: 8px; font-size: 14px; line-height: 1.8; white-space: pre-wrap; min-height: 60px; border: 2px solid #ddd; }
.ok { border-color: #3B6D11 !important; color: #3B6D11; }
.err { border-color: #A32D2D !important; color: #A32D2D; }
</style>
</head>
<body>
<h2>🔬 اختبار /api/execution-ai</h2>
<button onclick="runTest()">▶ شغّل الاختبار</button>
<div id="result">جاهز...</div>
<script>
async function runTest() {
  const el = document.getElementById('result');
  el.className = '';
  el.textContent = '⏳ جاري الاختبار...';
  try {
    const res = await fetch('/api/execution-ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: 'ما هو الحد الأقصى لدرجة حرارة الخرسانة عند الصب؟', module: 'pour' })
    });
    const data = await res.json();
    el.className = res.ok ? 'ok' : 'err';
    el.textContent = `HTTP Status: ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
  } catch(e) {
    el.className = 'err';
    el.textContent = `❌ خطأ: ${e.message}`;
  }
}
</script>
</body>
</html>
