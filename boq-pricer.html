<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOQ Pricer — Qatar Residential Villa | QatarSpec Pro</title>
<style>
:root {
  --navy:#0D1B3E; --gold:#C8922A; --gold2:#E8B84B;
  --bg:#080c18; --bg2:#0f1729; --bg3:#162040;
  --text:#e8eaf0; --text2:#a8b0c8; --text3:#606880;
  --green:#1E8449; --red:#C0392B; --blue:#1A5276;
  --border:rgba(200,146,42,0.15); --border2:rgba(200,146,42,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--navy) 0%,#0a1428 100%);border-bottom:1px solid var(--border2);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:14px;}
.logo-text h1{font-size:15px;font-weight:700;color:var(--gold2);}
.logo-text p{font-size:10px;color:var(--text3);}
.header-actions{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--gold2);}
.btn-outline:hover{background:rgba(200,146,42,0.1);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{filter:brightness(1.1);}
.btn-red{background:var(--red);color:#fff;font-size:11px;padding:5px 10px;}

/* ── PROJECT INFO BAR ── */
.project-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.project-field{display:flex;flex-direction:column;gap:2px;}
.project-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.project-field input,.project-field select{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:5px 9px;font-size:12px;outline:none;min-width:130px;}
.project-field input:focus,.project-field select:focus{border-color:var(--gold);}

/* ── SUMMARY CARDS ── */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;padding:14px 20px;background:var(--bg);}
.s-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px;text-align:center;}
.s-card .val{font-size:18px;font-weight:700;color:var(--gold2);}
.s-card .lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.s-card.warn .val{color:#E67E22;}
.s-card.good .val{color:var(--green);}

/* ── SECTIONS TABS ── */
.sections-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.sections-nav::-webkit-scrollbar{display:none;}
.sec-tab{padding:10px 14px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.sec-tab:hover{color:var(--text2);}
.sec-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.sec-tab .count{font-size:9px;background:rgba(200,146,42,0.15);color:var(--gold2);padding:1px 5px;border-radius:10px;margin-left:5px;}

/* ── BOQ TABLE ── */
.boq-wrapper{padding:16px 20px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.section-title{font-size:14px;font-weight:700;color:var(--gold2);}
.section-subtotal{font-size:13px;font-weight:700;color:var(--green);}

table{width:100%;border-collapse:collapse;}
thead tr{background:var(--navy);}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--gold);border-bottom:1px solid var(--border2);white-space:nowrap;}
th.r{text-align:right;}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
tr:hover td{background:rgba(200,146,42,0.04);}
tr.section-row td{background:rgba(13,27,62,0.8);color:var(--gold2);font-weight:700;font-size:12px;}

.td-no{color:var(--text3);font-size:11px;width:60px;}
.td-desc{color:var(--text);line-height:1.4;}
.td-unit{color:var(--text3);text-align:center;width:55px;}
.td-num{text-align:right;}
input.qty-input,input.rate-input{
  width:80px;background:var(--bg3);border:1px solid var(--border);
  border-radius:4px;color:var(--text);padding:4px 7px;font-size:12px;
  text-align:right;outline:none;
}
input.qty-input:focus,input.rate-input:focus{border-color:var(--gold);background:rgba(200,146,42,0.05);}
input.rate-input{width:100px;}
.total-cell{font-weight:700;color:var(--gold2);text-align:right;}
.zero{color:var(--text3);}

/* ── SECTION TOTALS ROW ── */
.subtotal-row td{background:rgba(13,27,62,0.6);font-weight:700;font-size:12px;border-top:1px solid var(--border);}

/* ── GRAND TOTAL ── */
.grand-total{background:var(--navy);border:1px solid var(--gold);border-radius:10px;padding:16px 20px;margin:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.grand-total .gt-label{font-size:13px;color:var(--text2);}
.grand-total .gt-val{font-size:24px;font-weight:900;color:var(--gold2);}
.grand-total .gt-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* ── RATE HINTS ── */
.rate-hint{font-size:9px;color:var(--text3);text-align:right;display:block;margin-top:1px;}

/* ── PRINT / EXPORT ── */
@media print{
  .header-actions,.sections-nav,.project-bar .btn,.btn{display:none!important;}
  body{background:#fff;color:#000;}
  .s-card{border:1px solid #ddd;}
  th{background:#0D1B3E;color:#C8922A;}
  input{border:none!important;background:transparent!important;color:#000!important;}
}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  th.hide-sm,td.hide-sm{display:none;}
  input.rate-input{width:80px;}
}
</style>
</head>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">QS</div>
    <div class="logo-text">
      <h1>BOQ Pricer — Qatar Residential Villa</h1>
      <p>Template: National Housing Loans · 12 Sections · 259 Items</p>
    </div>
  </div>
  <div class="header-actions">

    <button class="btn btn-outline" onclick="saveLocal()">💾 Save</button>
    <button class="btn btn-green" onclick="exportPDF()">📄 Export PDF</button>
    <button class="btn btn-gold" onclick="window.print()">🖨 Print BOQ</button>

</div>

<!-- PROJECT INFO -->
<div class="project-bar">

  <div class="project-field">

  </div>
  <div class="project-field">
    <label>Prepared by</label>
    <input type="text" id="proj-eng" placeholder="Engineer Name">
  </div>

</div>

<!-- SUMMARY CARDS -->
<div class="summary">

  <div class="s-card warn"><div class="val" id="s-missing">259</div><div class="lbl">Unpriced</div></div>
  <div class="s-card"><div class="val" id="s-subtotal">0 QAR</div><div class="lbl">Subtotal</div></div>
  <div class="s-card"><div class="val" id="s-contingency">0 QAR</div><div class="lbl">Contingency</div></div>
  <div class="s-card good"><div class="val" id="s-grand">0 QAR</div><div class="lbl">Grand Total</div></div>
</div>

<!-- SECTION TABS -->
<div class="sections-nav" id="secTabs"></div>

<!-- BOQ TABLE CONTAINER -->
<div class="boq-wrapper" id="boqBody"></div>

<!-- GRAND TOTAL -->
<div class="grand-total">

  </div>
  <div class="gt-val" id="gt-val">0 QAR</div>
</div>

// ── SUGGESTED RATE HINTS (Qatar 2024 market rates, QAR) ──
const RATE_HINTS = {
  'M3': '120–350',  'M2': '25–180',  'L M': '20–250',
  'Ton': '2200–3500', 'No.': '—', 'L S': '—', 'Set': '—', 'ITEM': '—'
};

// ── STATE ──
let state = {}; // { 'sectionNo-itemNo': { qty, rate } }
let activeSection = '1';

// ── INIT ──
document.getElementById('proj-date').value = new Date().toISOString().slice(0,10);

function init() {
  // load saved state
  try { const s = localStorage.getItem('qsp_boq'); if(s) state = JSON.parse(s); } catch(e){}
  renderTabs();
  renderSection(activeSection);
  recalcAll();
}

function renderTabs() {
  const nav = document.getElementById('secTabs');
  nav.innerHTML = BOQ_TEMPLATE.map(s => `
    <div class="sec-tab${s.no===activeSection?' active':''}" onclick="switchSection('${s.no}')">
      ${s.no}. ${s.title.split(' ').slice(0,3).join(' ')}
      <span class="count">${s.items.length}</span>
    </div>`).join('');
}

function switchSection(no) {
  activeSection = no;
  renderTabs();
  renderSection(no);
}

function renderSection(no) {
  const sec = BOQ_TEMPLATE.find(s => s.no === no);
  if(!sec) return;
  const subtotal = getSectionTotal(no);
  const filled = sec.items.filter(it => getRate(no,it.no) > 0).length;

  document.getElementById('boqBody').innerHTML = `
    <div class="section-header">
      <div class="section-title">Section ${sec.no}: ${sec.title}</div>
      <div class="section-subtotal">Section Total: ${fmt(subtotal)} QAR (${filled}/${sec.items.length} priced)</div>
    </div>
    <table>
      <thead><tr>
        <th style="width:55px">No.</th>
        <th>Description</th>
        <th style="width:55px;text-align:center">Unit</th>
        <th style="width:90px;text-align:right">Quantity</th>
        <th style="width:110px;text-align:right">Rate (QAR)</th>
        <th style="width:120px;text-align:right" class="r">Total (QAR)</th>
      </tr></thead>
      <tbody>
        ${sec.items.map(it => renderItem(no, it)).join('')}
        <tr class="subtotal-row">
          <td colspan="5" style="text-align:right;color:var(--text2);padding:8px 10px;">Section ${no} Subtotal</td>
          <td style="text-align:right;color:var(--gold2);padding:8px 10px;">${fmt(subtotal)} QAR</td>
        </tr>
      </tbody>
    </table>`;
}

function renderItem(secNo, it) {
  const key = `${secNo}-${it.no}`;
  const qty = state[key]?.qty ?? (it.default_qty ?? '');
  const rate = state[key]?.rate ?? '';
  const total = (parseFloat(qty)||0) * (parseFloat(rate)||0);
  const hint = RATE_HINTS[it.unit] || '—';
  return `
    <tr>
      <td class="td-no">${it.no}</td>
      <td class="td-desc">${it.description}</td>
      <td class="td-unit">${it.unit}</td>
      <td class="td-num">
        <input class="qty-input" type="number" min="0" step="any"
          value="${qty}" placeholder="qty"
          onchange="setVal('${secNo}','${it.no}','qty',this.value)"
          oninput="setVal('${secNo}','${it.no}','qty',this.value)">
      </td>
      <td class="td-num">
        <input class="rate-input" type="number" min="0" step="any"
          value="${rate}" placeholder="${hint}"
          onchange="setVal('${secNo}','${it.no}','rate',this.value)"
          oninput="setVal('${secNo}','${it.no}','rate',this.value)">
        ${hint!=='—'?`<span class="rate-hint">hint: ${hint}</span>`:''}
      </td>
      <td class="total-cell ${total===0?'zero':''}">${total>0?fmt(total):'—'}</td>
    </tr>`;
}

function setVal(secNo, itemNo, field, val) {
  const key = `${secNo}-${itemNo}`;
  if(!state[key]) state[key] = {};
  state[key][field] = parseFloat(val) || 0;
  // update only total cell without full re-render
  const qty = state[key].qty ?? 0;
  const rate = state[key].rate ?? 0;
  const total = qty * rate;
  // find total cell — re-render section totals and summary
  recalcAll();
  // re-render total cell in current row
  const rows = document.querySelectorAll('#boqBody tbody tr:not(.subtotal-row)');
  const sec = BOQ_TEMPLATE.find(s => s.no === secNo);
  if(sec) {
    const idx = sec.items.findIndex(it => it.no === itemNo);
    if(rows[idx]) {
      const tc = rows[idx].querySelector('.total-cell');
      if(tc){ tc.textContent = total>0?fmt(total):'—'; tc.className='total-cell'+(total===0?' zero':''); }
    }
    // update subtotal row
    const subRow = document.querySelector('.subtotal-row td:last-child');
    if(subRow) subRow.textContent = fmt(getSectionTotal(secNo))+' QAR';
    // update section header
    const sh = document.querySelector('.section-subtotal');
    const filled = sec.items.filter(it => (state[`${secNo}-${it.no}`]?.rate||0) > 0).length;
    if(sh) sh.textContent = `Section Total: ${fmt(getSectionTotal(secNo))} QAR (${filled}/${sec.items.length} priced)`;
  }
}

function getSectionTotal(secNo) {
  const sec = BOQ_TEMPLATE.find(s => s.no === secNo);
  if(!sec) return 0;
  return sec.items.reduce((sum, it) => {
    const key = `${secNo}-${it.no}`;
    const qty = state[key]?.qty ?? (it.default_qty ?? 0);
    const rate = state[key]?.rate ?? 0;
    return sum + (parseFloat(qty)||0) * (parseFloat(rate)||0);
  }, 0);
}

function recalcAll() {
  const subtotal = BOQ_TEMPLATE.reduce((s,sec) => s + getSectionTotal(sec.no), 0);
  const pct = parseFloat(document.getElementById('contingency').value)||0;
  const cont = subtotal * pct / 100;
  const grand = subtotal + cont;

  let filled=0, total=0;
  BOQ_TEMPLATE.forEach(sec => {
    sec.items.forEach(it => {
      total++;
      if((state[`${sec.no}-${it.no}`]?.rate||0) > 0) filled++;
    });
  });

  document.getElementById('s-filled').textContent = filled;
  document.getElementById('s-missing').textContent = total - filled;
  document.getElementById('s-subtotal').textContent = fmtK(subtotal);
  document.getElementById('s-contingency').textContent = fmtK(cont);
  document.getElementById('s-grand').textContent = fmtK(grand);
  document.getElementById('gt-val').textContent = fmt(grand) + ' QAR';
  document.getElementById('gt-breakdown').textContent =
    `Subtotal: ${fmt(subtotal)} QAR  +  Contingency (${pct}%): ${fmt(cont)} QAR`;

  saveLocal();
}

function fmt(n) { return Math.round(n).toLocaleString('en-QA'); }
function fmtK(n) { return n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':Math.round(n).toString(); }

function saveLocal() {
  try { localStorage.setItem('qsp_boq', JSON.stringify(state)); } catch(e){}
}

function clearAll() {
  if(!confirm('Clear all rates and quantities?')) return;
  state = {};
  localStorage.removeItem('qsp_boq');
  renderSection(activeSection);
  recalcAll();
}
