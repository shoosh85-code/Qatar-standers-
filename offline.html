<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QatarSpec Pro — غير متصل</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { color: #7A1515; font-size: 1.4rem; margin-bottom: 0.75rem; }
    p  { color: #555; line-height: 1.7; font-size: 0.95rem; margin-bottom: 0.5rem; }
    .badge {
      display: inline-block;
      background: #EAF3DE;
      color: #3B6D11;
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin: 0.75rem 0 1.5rem;
    }
    button {
      background: #7A1515;
      color: #fff;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      max-width: 220px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    .features {
      margin-top: 1.5rem;
      text-align: right;
      font-size: 0.88rem;
      color: #666;
      border-top: 1px solid #eee;
      padding-top: 1rem;
    }
    .features li { list-style: none; padding: 0.2rem 0; }
    .features li::before { content: "✓ "; color: #3B6D11; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔌</div>
    <h1>غير متصل بالإنترنت</h1>
    <p>QatarSpec Pro يعمل جزئياً بدون اتصال.</p>
    <span class="badge">PWA Offline Mode</span>
    <br>
    <button onclick="window.location.reload()">🔄 إعادة المحاولة</button>
    <ul class="features">
      <li>الحاسبات المحلية تعمل بشكل كامل</li>
      <li>النتائج المحفوظة متاحة</li>
      <li>البحث الذكي يحتاج اتصالاً</li>
    </ul>
  </div>
</body>
</html>
