<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مخطط جانت — Project Timeline | QatarSpec Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.20.3/xlsx.full.min.js" defer></script>
<style>
:root{--gold:#C9A84C;--gold2:#E8C97A;--red:#7a1515;--dark1:#0d0d0d;--dark3:#1a1a1a;--dark4:#222;--border:rgba(201,168,76,0.15);--text:#e8e0d0;--text2:#b8aa98;--text3:#7a7060;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark1);color:var(--text);font-family:Cairo,sans-serif;min-height:100vh;}
.header{background:linear-gradient(135deg,rgba(122,21,21,0.3),rgba(201,168,76,0.1));border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.header a{color:var(--gold);text-decoration:none;font-size:13px;}
.title{font-size:18px;font-weight:800;color:var(--gold2);flex:1;}
.main{max-width:1200px;margin:0 auto;padding:16px;}
.card{background:var(--dark3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;}
.inp{background:var(--dark4);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:Cairo,sans-serif;font-size:12px;width:100%;}
.inp:focus{outline:none;border-color:var(--gold);}
.btn{padding:7px 14px;border-radius:8px;font-family:Cairo,sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.2s;margin:2px;}
.btn-gold{background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.3);color:var(--gold);}
.btn-red{background:rgba(122,21,21,0.2);border-color:rgba(122,21,21,0.4);color:#e88;}
.btn-green{background:rgba(39,174,96,0.15);border-color:rgba(39,174,96,0.4);color:#27ae60;}
.gantt-wrap{overflow-x:auto;margin-top:12px;}
.gantt-table{border-collapse:collapse;min-width:900px;width:100%;}
.gantt-table th{background:rgba(122,21,21,0.4);color:var(--gold2);padding:6px 8px;font-size:11px;white-space:nowrap;text-align:right;}
.gantt-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:11px;vertical-align:middle;}
.gantt-bar-cell{padding:4px 2px;}
.gantt-bar{height:22px;border-radius:4px;position:relative;min-width:4px;}
.gantt-label{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:9px;color:rgba(0,0,0,0.8);font-weight:700;white-space:nowrap;overflow:hidden;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:4px;}
.status-not-started{background:#666;}
.status-in-progress{background:#f39c12;}
.status-completed{background:#27ae60;}
.status-delayed{background:#e74c3c;}
.progress-bar-bg{background:rgba(255,255,255,0.08);border-radius:4px;height:6px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#C9A84C,#E8C97A);}
.task-row:hover td{background:rgba(201,168,76,0.04);}
.add-task-row td{background:rgba(201,168,76,0.03);}
.badge{display:inline-block;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:2px 8px;font-size:10px;color:var(--gold);}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.summary-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.summary-val{font-size:22px;font-weight:800;color:var(--gold2);}
.summary-lbl{font-size:10px;color:var(--text3);margin-top:3px;}
@media(max-width:600px){.summary-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="header">
  <a href="/index.html">← الرئيسية</a>
  <div class="title">📅 مخطط جانت — Project Timeline</div>
  <span class="badge">QCS 2024</span>
</div>
<div class="main">

  <!-- Project Info -->
  <div class="card">
    <div class="card-title">📋 بيانات المشروع</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;">
      <div><div style="font-size:11px;color:var(--text3);margin-bottom:4px;">اسم المشروع</div><input class="inp" id="proj-name" placeholder="مثال: مشروع طريق الوكرة" value="مشروع إنشاء طريق"></div>
      <div><div style="font-size:11px;color:var(--text3);margin-bottom:4px;">تاريخ البداية</div><input class="inp" type="date" id="proj-start"></div>
      <div><div style="font-size:11px;color:var(--text3);margin-bottom:4px;">المقاول</div><input class="inp" id="contractor" placeholder="اسم الشركة"></div>
    </div>
    <div>
      <button class="btn btn-gold" onclick="addQCSTemplate()">📋 استيراد مراحل QCS 2024</button>
      <button class="btn btn-green" onclick="exportGanttExcel()">📊 تصدير Excel</button>
      <button class="btn" style="background:rgba(52,152,219,0.15);border-color:rgba(52,152,219,0.3);color:#3498db;" onclick="window.print()">🖨️ طباعة</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-grid">
    <div class="summary-card"><div class="summary-val" id="sum-total">0</div><div class="summary-lbl">إجمالي المهام</div></div>
    <div class="summary-card"><div class="summary-val" id="sum-done">0</div><div class="summary-lbl">مكتملة</div></div>
    <div class="summary-card"><div class="summary-val" id="sum-progress">0</div><div class="summary-lbl">جارية</div></div>
    <div class="summary-card"><div class="summary-val" id="sum-delayed">0</div><div class="summary-lbl">متأخرة</div></div>
  </div>

  <!-- Gantt Chart -->
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>📊 مخطط جانت التفصيلي</span>
      <button class="btn btn-gold" onclick="addTask()">+ إضافة مهمة</button>
    </div>
    <div class="gantt-wrap">
      <table class="gantt-table" id="gantt-table">
        <thead>
          <tr>
            <th style="min-width:200px;">المرحلة / النشاط</th>
            <th style="min-width:80px;">البداية</th>
            <th style="min-width:80px;">النهاية</th>
            <th style="min-width:60px;">المدة</th>
            <th style="min-width:80px;">المسؤول</th>
            <th style="min-width:80px;">الحالة</th>
            <th style="min-width:60px;">الإنجاز</th>
            <th style="min-width:200px;">شريط التقدم</th>
            <th style="min-width:60px;">إجراء</th>
          </tr>
        </thead>
        <tbody id="gantt-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
var tasks = [];
var taskId = 0;

var STATUS_COLORS = {
  'not-started': '#666',
  'in-progress': '#f39c12',
  'completed': '#27ae60',
  'delayed': '#e74c3c'
};

var STATUS_LABELS = {
  'not-started': 'لم يبدأ',
  'in-progress': 'جارٍ',
  'completed': 'مكتمل',
  'delayed': 'متأخر'
};

// QCS 2024 Road Construction Phases
var QCS_ROAD_PHASES = [
  { name: 'أعمال المسح والتخطيط', dur: 14, resp: 'مهندس المساحة', color: '#3498db' },
  { name: 'تحضير الموقع والهدم', dur: 7, resp: 'مقاول الهدم', color: '#e67e22' },
  { name: 'أعمال الحفر والردم (Subgrade)', dur: 21, resp: 'مقاول الطرق', color: '#8B6914' },
  { name: 'Subbase Layer — QCS S6 P3', dur: 14, resp: 'مقاول الطرق', color: '#A0522D' },
  { name: 'Base Course — QCS S6 P4', dur: 14, resp: 'مقاول الطرق', color: '#C9A84C' },
  { name: 'شبكات المرافق (المياه والصرف)', dur: 30, resp: 'مقاول المرافق', color: '#2980b9' },
  { name: 'Binder Course — QCS S6 P5', dur: 10, resp: 'مقاول الأسفلت', color: '#2c3e50' },
  { name: 'Wearing Course — QCS S6 P5', dur: 7, resp: 'مقاول الأسفلت', color: '#1a1a1a' },
  { name: 'أعمال الأرصفة والكيرب', dur: 14, resp: 'مقاول الطرق', color: '#7f8c8d' },
  { name: 'الإنارة والإشارات', dur: 14, resp: 'مقاول الكهرباء', color: '#f1c40f' },
  { name: 'اختبارات الاستلام — QCS ITPs', dur: 7, resp: 'مهندس QC', color: '#27ae60' },
  { name: 'التسليم النهائي', dur: 7, resp: 'مدير المشروع', color: '#8e44ad' },
];

function addQCSTemplate() {
  tasks = [];
  taskId = 0;
  var startDate = document.getElementById('proj-start').value || new Date().toISOString().split('T')[0];
  var current = new Date(startDate);

  QCS_ROAD_PHASES.forEach(function(phase) {
    var start = current.toISOString().split('T')[0];
    current.setDate(current.getDate() + phase.dur);
    var end = current.toISOString().split('T')[0];
    tasks.push({
      id: ++taskId,
      name: phase.name,
      start: start,
      end: end,
      dur: phase.dur,
      resp: phase.resp,
      status: 'not-started',
      progress: 0,
      color: phase.color
    });
  });
  renderGantt();
}

function addTask() {
  var today = new Date().toISOString().split('T')[0];
  tasks.push({
    id: ++taskId,
    name: 'مهمة جديدة',
    start: today,
    end: today,
    dur: 7,
    resp: '',
    status: 'not-started',
    progress: 0,
    color: '#C9A84C'
  });
  renderGantt();
}

function deleteTask(id) {
  tasks = tasks.filter(function(t) { return t.id !== id; });
  renderGantt();
}

function updateTask(id, field, value) {
  var task = tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  task[field] = value;
  if (field === 'start' || field === 'end') {
    var s = new Date(task.start), e = new Date(task.end);
    if (e > s) task.dur = Math.round((e - s) / (1000*60*60*24));
  }
  if (field === 'progress') task.progress = parseInt(value) || 0;
  renderGantt();
}

function renderGantt() {
  var tbody = document.getElementById('gantt-body');
  if (!tbody) return;

  // Find project date range
  var allDates = tasks.flatMap(function(t) { return [new Date(t.start), new Date(t.end)]; });
  var minDate = allDates.length ? new Date(Math.min.apply(null, allDates)) : new Date();
  var maxDate = allDates.length ? new Date(Math.max.apply(null, allDates)) : new Date();
  var totalDays = Math.max(1, (maxDate - minDate) / (1000*60*60*24));

  tbody.innerHTML = tasks.map(function(task) {
    var barLeft = ((new Date(task.start) - minDate) / (1000*60*60*24)) / totalDays * 100;
    var barWidth = (task.dur / totalDays) * 100;
    barWidth = Math.max(barWidth, 2);

    return '<tr class="task-row">' +
      '<td><input style="background:transparent;border:none;color:var(--text);font-family:Cairo,sans-serif;font-size:12px;width:100%;" value="' + task.name + '" onchange="updateTask(' + task.id + ',\'name\',this.value)"></td>' +
      '<td><input class="inp" type="date" value="' + task.start + '" onchange="updateTask(' + task.id + ',\'start\',this.value)" style="padding:3px 6px;font-size:11px;"></td>' +
      '<td><input class="inp" type="date" value="' + task.end + '" onchange="updateTask(' + task.id + ',\'end\',this.value)" style="padding:3px 6px;font-size:11px;"></td>' +
      '<td style="text-align:center;">' + task.dur + ' يوم</td>' +
      '<td><input style="background:transparent;border:none;color:var(--text2);font-family:Cairo,sans-serif;font-size:11px;width:100%;" value="' + (task.resp||'') + '" onchange="updateTask(' + task.id + ',\'resp\',this.value)"></td>' +
      '<td><select class="inp" onchange="updateTask(' + task.id + ',\'status\',this.value)" style="padding:3px 6px;font-size:11px;">' +
        Object.keys(STATUS_LABELS).map(function(s) {
          return '<option value="' + s + '"' + (task.status===s?' selected':'') + '>' + STATUS_LABELS[s] + '</option>';
        }).join('') +
      '</select></td>' +
      '<td><input class="inp" type="number" min="0" max="100" value="' + task.progress + '" onchange="updateTask(' + task.id + ',\'progress\',this.value)" style="padding:3px 6px;font-size:11px;width:60px;"> %</td>' +
      '<td class="gantt-bar-cell"><div style="background:rgba(255,255,255,0.05);height:24px;border-radius:4px;position:relative;overflow:hidden;">' +
        '<div class="gantt-bar" style="position:absolute;right:' + barLeft + '%;width:' + barWidth + '%;background:' + (task.color||'#C9A84C') + ';opacity:0.85;">' +
        '</div>' +
        '</div>' +
        '<div class="progress-bar-bg" style="margin-top:3px;"><div class="progress-bar-fill" style="width:' + task.progress + '%"></div></div>' +
      '</td>' +
      '<td><button class="btn btn-red" onclick="deleteTask(' + task.id + ')" style="padding:3px 8px;">✕</button></td>' +
      '</tr>';
  }).join('');

  // Update summary
  document.getElementById('sum-total').textContent = tasks.length;
  document.getElementById('sum-done').textContent = tasks.filter(function(t){return t.status==='completed';}).length;
  document.getElementById('sum-progress').textContent = tasks.filter(function(t){return t.status==='in-progress';}).length;
  document.getElementById('sum-delayed').textContent = tasks.filter(function(t){return t.status==='delayed';}).length;
}

function exportGanttExcel() {
  if (typeof XLSX === 'undefined') { setTimeout(exportGanttExcel, 500); return; }
  var wb = XLSX.utils.book_new();
  var proj = document.getElementById('proj-name').value || 'مشروع';
  var data = [
    ['QatarSpec Pro — Project Timeline / Gantt Chart', '', '', '', '', '', ''],
    ['المشروع:', proj, '', 'التاريخ:', new Date().toLocaleDateString('ar-QA'), '', ''],
    ['المقاول:', document.getElementById('contractor').value || '', '', 'المرجع:', 'QCS 2024', '', ''],
    ['', '', '', '', '', '', ''],
    ['المرحلة / النشاط', 'تاريخ البداية', 'تاريخ النهاية', 'المدة (يوم)', 'المسؤول', 'الحالة', 'نسبة الإنجاز'],
  ];
  tasks.forEach(function(t) {
    data.push([t.name, t.start, t.end, t.dur, t.resp, STATUS_LABELS[t.status]||t.status, t.progress + '%']);
  });
  data.push(['', '', '', '', '', '', '']);
  data.push(['إجمالي المهام:', tasks.length, 'مكتملة:', tasks.filter(function(t){return t.status==='completed';}).length, 'متأخرة:', tasks.filter(function(t){return t.status==='delayed';}).length, '']);
  var ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:40},{wch:14},{wch:14},{wch:12},{wch:20},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'Gantt');
  XLSX.writeFile(wb, 'QatarSpec-Gantt-' + new Date().toISOString().slice(0,10) + '.xlsx');
}

// Init
document.getElementById('proj-start').value = new Date().toISOString().split('T')[0];
addQCSTemplate();
</script>
</body>
</html>
