<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QatarSpec Pro — استلام الأعمال</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --primary: #1a3a5c;
  --primary-light: #2a5a8c;
  --accent: #c8a84b;
  --accent-light: #e8c87b;
  --success: #2ecc71;
  --danger: #e74c3c;
  --warning: #f39c12;
  --info: #3498db;
  --bg: #f5f7fa;
  --bg-card: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #dde3ea;
  --shadow: 0 2px 12px rgba(26,58,92,0.10);
  --shadow-hover: 0 6px 24px rgba(26,58,92,0.18);
  --radius: 12px;
  --radius-sm: 8px;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  min-height: 100vh;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff;
  padding: 0;
  box-shadow: 0 2px 16px rgba(26,58,92,0.25);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  max-width: 1400px;
  margin: 0 auto;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 44px;
  height: 44px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 800;
  color: var(--primary);
}
.logo-text h1 {
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: 0.5px;
}
.logo-text p {
  font-size: 0.72rem;
  opacity: 0.8;
  font-weight: 400;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-back {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  transition: background 0.2s;
  display: none;
}
.btn-back:hover { background: rgba(255,255,255,0.25); }
.btn-back.visible { display: flex; align-items: center; gap: 6px; }

/* ===== PROJECT INFO BAR ===== */
.project-bar {
  background: var(--accent);
  padding: 8px 24px;
}
.project-bar-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.project-field {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  color: var(--primary);
  font-weight: 600;
}
.project-field label {
  opacity: 0.75;
  font-weight: 500;
  white-space: nowrap;
}
.project-field input {
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(26,58,92,0.2);
  border-radius: 6px;
  padding: 3px 8px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  color: var(--primary);
  font-weight: 600;
  min-width: 130px;
}
.project-field input:focus {
  outline: none;
  background: rgba(255,255,255,0.9);
}

/* ===== MAIN LAYOUT ===== */
.main-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  max-width: 1400px;
  margin: 0 auto;
  min-height: calc(100vh - 120px);
}

/* ===== SIDEBAR ===== */
.sidebar {
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 120px;
  height: calc(100vh - 120px);
  overflow-y: auto;
}
.sidebar-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 16px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s, color 0.15s;
  border-right: 3px solid transparent;
  position: relative;
}
.sidebar-item:hover { background: var(--bg); }
.sidebar-item.active {
  background: #eef3f9;
  border-right-color: var(--primary);
  color: var(--primary);
}
.sidebar-item .item-icon { font-size: 1.3rem; flex-shrink: 0; }
.sidebar-item .item-info { flex: 1; min-width: 0; }
.sidebar-item .item-name-ar {
  font-size: 0.82rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-item .item-name-en {
  font-size: 0.68rem;
  color: var(--text-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-progress {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
  flex-shrink: 0;
}
.progress-pct {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--primary);
}
.progress-mini {
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-mini-fill {
  height: 100%;
  background: var(--success);
  border-radius: 2px;
  transition: width 0.3s;
}

/* ===== CONTENT AREA ===== */
.content-area {
  padding: 24px;
}

/* ===== SELECTION GRID (13 cards) ===== */
.selection-header {
  margin-bottom: 24px;
}
.selection-header h2 {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 4px;
}
.selection-header p {
  font-size: 0.88rem;
  color: var(--text-light);
}
.selection-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ===== WORK CARD ===== */
.work-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
.work-card::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 4px;
  height: 100%;
  background: var(--primary);
  transform: scaleY(0);
  transition: transform 0.2s;
  transform-origin: bottom;
}
.work-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}
.work-card:hover::before { transform: scaleY(1); }
.work-card.started { border-color: var(--accent); }
.work-card.started::before { background: var(--accent); transform: scaleY(1); }
.work-card.completed { border-color: var(--success); }
.work-card.completed::before { background: var(--success); transform: scaleY(1); }

.card-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }
.card-names { margin-bottom: 8px; }
.card-name-ar { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.card-name-en { font-size: 0.75rem; color: var(--text-light); font-weight: 400; }
.card-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.card-qcs { font-size: 0.65rem; color: var(--primary); background: #eef3f9; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.card-badge {
  font-size: 0.65rem;
  font-weight: 700;
  background: var(--primary);
  color: #fff;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
}
.card-progress { display: none; }
.card-progress.visible { display: block; }
.card-progress-bar {
  height: 5px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 3px;
}
.card-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--success), #27ae60);
  border-radius: 3px;
  transition: width 0.4s;
}
.card-progress-label { font-size: 0.65rem; color: var(--text-light); text-align: left; direction: ltr; }

/* ===== CHECKLIST VIEW ===== */
.checklist-view { display: none; }
.checklist-view.active { display: block; }

.work-header {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.work-header-info { display: flex; align-items: center; gap: 14px; }
.work-header-icon { font-size: 2.5rem; }
.work-header-text h2 { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
.work-header-text p { font-size: 0.8rem; color: var(--text-light); margin-top: 2px; }
.work-header-stats { display: flex; gap: 16px; }
.stat-box {
  text-align: center;
  min-width: 60px;
}
.stat-num { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
.stat-num.green { color: var(--success); }
.stat-num.orange { color: var(--warning); }
.stat-label { font-size: 0.65rem; color: var(--text-light); font-weight: 600; }

/* ===== PROGRESS BAR MAIN ===== */
.main-progress-section {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.main-progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.main-progress-header span:first-child { font-size: 0.85rem; font-weight: 700; color: var(--text); }
.main-progress-pct { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
.main-progress-bar {
  height: 10px;
  background: var(--border);
  border-radius: 5px;
  overflow: hidden;
}
.main-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--success), #27ae60);
  border-radius: 5px;
  transition: width 0.5s;
}
.progress-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 0.72rem;
  color: var(--text-light);
}

/* ===== PHASE SECTION ===== */
.phase-section {
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.phase-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  cursor: pointer;
  background: #f8fafc;
  border-bottom: 1px solid var(--border);
  user-select: none;
}
.phase-header:hover { background: #eef3f9; }
.phase-header h3 { font-size: 0.9rem; font-weight: 700; color: var(--primary); }
.phase-toggle { font-size: 0.75rem; color: var(--text-light); display: flex; align-items: center; gap: 8px; }
.phase-toggle-icon { transition: transform 0.2s; font-size: 0.8rem; }
.phase-section.collapsed .phase-toggle-icon { transform: rotate(-90deg); }
.phase-items { padding: 8px 0; }
.phase-section.collapsed .phase-items { display: none; }

/* ===== CHECKLIST ITEM ===== */
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid #f0f2f5;
  transition: background 0.15s;
}
.checklist-item:last-child { border-bottom: none; }
.checklist-item:hover { background: #fafbfc; }

.item-checkbox {
  position: relative;
  flex-shrink: 0;
  margin-top: 2px;
}
.item-checkbox input[type="checkbox"] {
  appearance: none;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.item-checkbox input[type="checkbox"]:checked {
  background: var(--success);
  border-color: var(--success);
}
.item-checkbox input[type="checkbox"]:checked::after {
  content: '✓';
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.item-checkbox input[type="checkbox"].failed {
  background: var(--danger);
  border-color: var(--danger);
}
.item-checkbox input[type="checkbox"].failed::after {
  content: '✕';
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.item-content { flex: 1; min-width: 0; }
.item-ar { font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.item-en { font-size: 0.75rem; color: var(--text-light); margin-bottom: 5px; }
.item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.item-qcs {
  font-size: 0.65rem;
  color: var(--primary);
  background: #eef3f9;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 600;
}
.item-tolerance {
  font-size: 0.65rem;
  color: var(--warning);
  background: #fff8ec;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 600;
}
.item-required {
  font-size: 0.6rem;
  color: var(--danger);
  background: #fdf0f0;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 700;
}

.item-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
  align-items: center;
}
.btn-pass, .btn-fail, .btn-na {
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 4px 8px;
  transition: opacity 0.2s, transform 0.1s;
  white-space: nowrap;
}
.btn-pass { background: var(--success); color: #fff; }
.btn-fail { background: var(--danger); color: #fff; }
.btn-na { background: var(--border); color: var(--text-light); }
.btn-pass:hover, .btn-fail:hover, .btn-na:hover { opacity: 0.85; transform: scale(1.03); }

.item-status-badge {
  display: none;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
}
.item-status-badge.pass { display: inline-block; background: #e8f8f0; color: var(--success); }
.item-status-badge.fail { display: inline-block; background: #fdf0f0; color: var(--danger); }
.item-status-badge.na { display: inline-block; background: var(--bg); color: var(--text-light); }

/* ===== RESULT SECTION ===== */
.result-section {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-top: 20px;
  box-shadow: var(--shadow);
}
.result-section h3 { font-size: 1rem; font-weight: 800; color: var(--primary); margin-bottom: 16px; }
.result-status {
  text-align: center;
  padding: 20px;
  border-radius: var(--radius-sm);
  font-size: 1.1rem;
  font-weight: 800;
  margin-bottom: 16px;
}
.result-status.pass { background: #e8f8f0; color: var(--success); border: 2px solid var(--success); }
.result-status.fail { background: #fdf0f0; color: var(--danger); border: 2px solid var(--danger); }
.result-status.pending { background: #eef3f9; color: var(--primary); border: 2px solid var(--primary); }

.result-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.result-item {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.result-item-num { font-size: 1.4rem; font-weight: 800; }
.result-item-num.green { color: var(--success); }
.result-item-num.red { color: var(--danger); }
.result-item-num.blue { color: var(--primary); }
.result-item-num.orange { color: var(--warning); }
.result-item-label { font-size: 0.72rem; color: var(--text-light); font-weight: 600; margin-top: 2px; }

/* ===== FAILED ITEMS LIST ===== */
.failed-items-list {
  border: 1px solid #fde8e8;
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.failed-item-row {
  padding: 8px 14px;
  border-bottom: 1px solid #fde8e8;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
}
.failed-item-row:last-child { border-bottom: none; }
.failed-item-row::before { content: '✕'; color: var(--danger); font-weight: 700; font-size: 0.75rem; flex-shrink: 0; }
.failed-header {
  background: #fdf0f0;
  padding: 8px 14px;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--danger);
  border-bottom: 1px solid #fde8e8;
}

/* ===== BUTTONS ROW ===== */
.action-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 20px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-primary:hover { background: var(--primary-light); }
.btn-secondary {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 20px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-secondary:hover { background: var(--border); }

/* ===== MOBILE SIDEBAR TOGGLE ===== */
.sidebar-toggle-btn {
  display: none;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 1.2rem;
  cursor: pointer;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 200;
  box-shadow: var(--shadow-hover);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .selection-grid { grid-template-columns: repeat(2, 1fr); }
  .main-layout { grid-template-columns: 240px 1fr; }
}

@media (max-width: 768px) {
  .selection-grid { grid-template-columns: 1fr 1fr; }
  .main-layout { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    right: -280px;
    top: 0;
    height: 100vh;
    width: 280px;
    z-index: 150;
    transition: right 0.3s;
    box-shadow: var(--shadow-hover);
  }
  .sidebar.open { right: 0; }
  .sidebar-toggle-btn { display: flex; align-items: center; justify-content: center; }
  .result-grid { grid-template-columns: repeat(2, 1fr); }
  .header-inner { padding: 12px 16px; }
  .project-bar-inner { gap: 12px; }
  .content-area { padding: 16px; }
}

@media (max-width: 480px) {
  .selection-grid { grid-template-columns: 1fr; }
  .work-header { flex-direction: column; align-items: flex-start; }
}

/* ===== OVERLAY ===== */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 140;
}
.sidebar-overlay.active { display: block; }

/* ===== PRINT ===== */
@media print {
  .header-actions, .sidebar-toggle-btn, .sidebar-overlay,
  .btn-pass, .btn-fail, .btn-na, .action-row { display: none !important; }
  .main-layout { grid-template-columns: 1fr; }
  .sidebar { display: none !important; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-inner">
    <div class="header-logo">
      <div class="logo-icon">QS</div>
      <div class="logo-text">
        <h1>QatarSpec Pro</h1>
        <p>نظام استلام الأعمال الهندسية — QCS 2024</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-back" id="btnBack" onclick="window.QS.goBack()">
        ← العودة للقائمة
      </button>
    </div>
  </div>
</header>

<!-- ===== PROJECT BAR ===== -->
<div class="project-bar">
  <div class="project-bar-inner">
    <div class="project-field">
      <label>المشروع:</label>
      <input type="text" id="projectName" placeholder="اسم المشروع" value="">
    </div>
    <div class="project-field">
      <label>المهندس:</label>
      <input type="text" id="engineerName" placeholder="اسم المهندس" value="">
    </div>
    <div class="project-field">
      <label>التاريخ:</label>
      <input type="date" id="inspectionDate" value="">
    </div>

// =====================================================================
// STATE MANAGEMENT
// =====================================================================
const state = {
  currentWork: null,
  itemStatuses: {}, // { workId: { itemId: 'pass'|'fail'|'na'|null } }
  collapsePhases: {}
};

// =====================================================================
// HELPERS
// =====================================================================
function countItems(workId) {
  const work = WORK_ACCEPTANCE_DATA[workId];
  let total = 0;
  work.phases.forEach(p => total += p.items.length);
  return total;
}

function getWorkStats(workId) {
  const work = WORK_ACCEPTANCE_DATA[workId];
  const statuses = state.itemStatuses[workId] || {};
  let total = 0, passed = 0, failed = 0, na = 0;
  work.phases.forEach(p => p.items.forEach(item => {
    total++;
    const s = statuses[item.id];
    if (s === 'pass') passed++;
    else if (s === 'fail') failed++;
    else if (s === 'na') na++;
  }));
  const checked = passed + failed + na;
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  return { total, passed, failed, na, checked, pct };
}

function getWorkResult(workId) {
  const work = WORK_ACCEPTANCE_DATA[workId];
  const statuses = state.itemStatuses[workId] || {};
  const { total, failed, checked } = getWorkStats(workId);
  if (checked < total) return 'pending';
  // Check if any REQUIRED item failed
  let reqFailed = false;
  work.phases.forEach(p => p.items.forEach(item => {
    if (item.required && statuses[item.id] === 'fail') reqFailed = true;
  }));
  if (reqFailed || failed > 0) return 'fail';
  return 'pass';
}

function sanitize(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// =====================================================================
// RENDER SIDEBAR
// =====================================================================
function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  Object.values(WORK_ACCEPTANCE_DATA).forEach(work => {
    const stats = getWorkStats(work.id);
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (state.currentWork === work.id ? ' active' : '');
    item.onclick = () => openWork(work.id);
    item.innerHTML = `
      <span class="item-icon">${work.icon}</span>
      <div class="item-info">
        <div class="item-name-ar">${sanitize(work.name_ar)}</div>
        <div class="item-name-en">${sanitize(work.name_en)}</div>
      </div>
      <div class="sidebar-progress">
        <span class="progress-pct">${stats.pct}%</span>
        <div class="progress-mini"><div class="progress-mini-fill" style="width:${stats.pct}%"></div></div>
      </div>`;
    list.appendChild(item);
  });
}

// =====================================================================
// RENDER SELECTION GRID
// =====================================================================
function renderSelectionGrid() {
  const grid = document.getElementById('selectionGrid');
  grid.innerHTML = '';
  Object.values(WORK_ACCEPTANCE_DATA).forEach(work => {
    const stats = getWorkStats(work.id);
    const result = getWorkResult(work.id);
    let cardClass = 'work-card';
    if (stats.checked > 0 && result === 'pass') cardClass += ' completed';
    else if (stats.checked > 0) cardClass += ' started';

    const card = document.createElement('div');
    card.className = cardClass;
    card.onclick = () => openWork(work.id);
    card.innerHTML = `
      <span class="card-icon">${work.icon}</span>
      <div class="card-names">
        <div class="card-name-ar">${sanitize(work.name_ar)}</div>
        <div class="card-name-en">${sanitize(work.name_en)}</div>
      </div>
      <div class="card-meta">
        <span class="card-qcs">${sanitize(work.qcs_ref.split(' — ')[0])}</span>
        <span class="card-badge">${countItems(work.id)} بند</span>
      </div>
      <div class="card-progress ${stats.checked > 0 ? 'visible' : ''}">
        <div class="card-progress-bar">
          <div class="card-progress-fill" style="width:${stats.pct}%"></div>
        </div>
        <div class="card-progress-label">${stats.checked}/${stats.total} — ${stats.pct}%</div>
      </div>`;
    grid.appendChild(card);
  });
}

// =====================================================================
// OPEN WORK (CHECKLIST VIEW)
// =====================================================================
function openWork(workId) {
  state.currentWork = workId;
  const work = WORK_ACCEPTANCE_DATA[workId];
  if (!state.itemStatuses[workId]) state.itemStatuses[workId] = {};

  // Show checklist view, hide selection
  document.getElementById('selectionView').style.display = 'none';
  const cv = document.getElementById('checklistView');
  cv.classList.add('active');

  // Show back button
  document.getElementById('btnBack').classList.add('visible');

  renderWorkHeader(work);
  renderMainProgress(workId);
  renderPhases(work);
  renderResult(workId);
  renderSidebar();
}

// ===== PHASES =====
function renderPhases(work) {
  const list = document.getElementById('phaseList');
  list.innerHTML = '';
  work.phases.forEach(phase => {
    const collapsed = state.collapsePhases[phase.id] ? 'collapsed' : '';
    const section = document.createElement('div');
    section.className = `phase-section ${collapsed}`;
    section.id = `phase-${phase.id}`;

    const completedItems = phase.items.filter(i => {
      const s = (state.itemStatuses[work.id] || {})[i.id];
      return s === 'pass' || s === 'fail' || s === 'na';
    }).length;

    section.innerHTML = `
      <div class="phase-header" onclick="window.QS.togglePhase('${phase.id}')">
        <h3>${sanitize(phase.name_ar)}</h3>
        <div class="phase-toggle">
          <span>${completedItems}/${phase.items.length} بند</span>
          <span class="phase-toggle-icon">▼</span>
        </div>
      </div>
      <div class="phase-items" id="phase-items-${phase.id}"></div>`;
    list.appendChild(section);

    const itemsContainer = section.querySelector(`#phase-items-${phase.id}`);
    phase.items.forEach(item => {
      itemsContainer.appendChild(renderItem(work.id, item));
    });
  });
}

// ===== SINGLE ITEM =====
function renderItem(workId, item) {
  const statuses = state.itemStatuses[workId] || {};
  const status = statuses[item.id] || null;
  const row = document.createElement('div');
  row.className = 'checklist-item';
  row.id = `item-row-${item.id}`;

  const passActive = status === 'pass' ? 'style="outline:2px solid var(--success)"' : '';
  const failActive = status === 'fail' ? 'style="outline:2px solid var(--danger)"' : '';
  const naActive = status === 'na' ? 'style="outline:2px solid var(--text-light)"' : '';

  const badgeHtml = status
    ? `<span class="item-status-badge ${status}">${status === 'pass' ? '✓ مطابق' : status === 'fail' ? '✕ مرفوض' : '— N/A'}</span>`
    : '';

  row.innerHTML = `
    <div class="item-checkbox">
      <input type="checkbox" id="cb-${item.id}" ${status === 'pass' ? 'checked' : ''} 
        class="${status === 'fail' ? 'failed' : ''}" readonly>
    </div>
    <div class="item-content">
      <div class="item-ar">${sanitize(item.ar)}</div>
      <div class="item-en">${sanitize(item.en)}</div>
      <div class="item-meta">
        ${item.qcs ? `<span class="item-qcs">${sanitize(item.qcs)}</span>` : ''}
        ${item.tolerance ? `<span class="item-tolerance">⚡ ${sanitize(item.tolerance)}</span>` : ''}
        ${item.required ? '<span class="item-required">إلزامي</span>' : ''}
        ${badgeHtml}
      </div>
    </div>
    <div class="item-actions">
      <button class="btn-pass" ${passActive} onclick="window.QS.setItemStatus('${workId}','${item.id}','pass')">✓ مطابق</button>
      <button class="btn-fail" ${failActive} onclick="window.QS.setItemStatus('${workId}','${item.id}','fail')">✕ مرفوض</button>
      <button class="btn-na" ${naActive} onclick="window.QS.setItemStatus('${workId}','${item.id}','na')">N/A</button>
    </div>`;
  return row;
}

// ===== RESULT SECTION =====
function renderResult(workId) {
  const work = WORK_ACCEPTANCE_DATA[workId];
  const statuses = state.itemStatuses[workId] || {};
  const stats = getWorkStats(workId);
  const result = getWorkResult(workId);

  const resultLabels = {
    pass: '✅ مقبول — جميع البنود مطابقة لـ QCS 2024',
    fail: '❌ مرفوض — يوجد بنود غير مطابقة تستوجب المعالجة',
    pending: '⏳ قيد الفحص — لم يكتمل الفحص بعد'
  };

  // Collect failed items
  const failedItems = [];
  work.phases.forEach(p => p.items.forEach(item => {
    if (statuses[item.id] === 'fail') failedItems.push(item);
  }));

  const section = document.getElementById('resultSection');
  section.innerHTML = `
    <h3>نتيجة الاستلام</h3>
    <div class="result-status ${result}">${resultLabels[result]}</div>
    <div class="result-grid">
      <div class="result-item">
        <div class="result-item-num blue">${stats.total}</div>
        <div class="result-item-label">إجمالي البنود</div>
      </div>
      <div class="result-item">
        <div class="result-item-num green">${stats.passed}</div>
        <div class="result-item-label">بند اجتاز</div>
      </div>
      <div class="result-item">
        <div class="result-item-num red">${stats.failed}</div>
        <div class="result-item-label">بند فشل</div>
      </div>
      <div class="result-item">
        <div class="result-item-num orange">${stats.total - stats.checked}</div>
        <div class="result-item-label">لم يُفحص</div>
      </div>
    </div>
    ${failedItems.length > 0 ? `
      <div class="failed-items-list">
        <div class="failed-header">⚠️ البنود المرفوضة (${failedItems.length} بند)</div>
        ${failedItems.map(i => `<div class="failed-item-row">${sanitize(i.ar)}</div>`).join('')}
      </div>` : ''}
    <div class="action-row">
      <button class="btn-primary" onclick="window.QS.resetWork('${workId}')">🔄 إعادة تعيين</button>
      <button class="btn-secondary" onclick="window.print()">🖨️ طباعة</button>
    </div>`;
}

// =====================================================================
// PUBLIC API — window.QS
// =====================================================================
window.QS = {
  setItemStatus(workId, itemId, status) {
    if (!state.itemStatuses[workId]) state.itemStatuses[workId] = {};
    // Toggle if same status clicked
    if (state.itemStatuses[workId][itemId] === status) {
      delete state.itemStatuses[workId][itemId];
    } else {
      state.itemStatuses[workId][itemId] = status;
    }
    // Re-render item row
    const work = WORK_ACCEPTANCE_DATA[workId];
    let foundItem = null;
    work.phases.forEach(p => p.items.forEach(i => { if (i.id === itemId) foundItem = i; }));
    if (foundItem) {
      const oldRow = document.getElementById(`item-row-${itemId}`);
      if (oldRow) oldRow.replaceWith(renderItem(workId, foundItem));
    }
    renderWorkHeader(work);
    renderMainProgress(workId);
    renderResult(workId);
    renderSidebar();
    renderSelectionGrid();
    // Update phase header counter
    work.phases.forEach(phase => {
      const items = phase.items;
      if (!items.find(i => i.id === itemId)) return;
      const completedItems = items.filter(i => {
        const s = (state.itemStatuses[workId] || {})[i.id];
        return s === 'pass' || s === 'fail' || s === 'na';
      }).length;
      const toggle = document.querySelector(`#phase-${phase.id} .phase-toggle span`);
      if (toggle) toggle.textContent = `${completedItems}/${items.length} بند`;
    });
  },

  togglePhase(phaseId) {
    state.collapsePhases[phaseId] = !state.collapsePhases[phaseId];
    const section = document.getElementById(`phase-${phaseId}`);
    if (section) section.classList.toggle('collapsed');
  },

  goBack() {
    state.currentWork = null;
    document.getElementById('selectionView').style.display = '';
    document.getElementById('checklistView').classList.remove('active');
    document.getElementById('btnBack').classList.remove('visible');
    renderSidebar();
    renderSelectionGrid();
  },

  resetWork(workId) {
    if (!confirm('هل تريد مسح جميع نتائج هذا العمل؟')) return;
    state.itemStatuses[workId] = {};
    openWork(workId);
  },

  toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebarOverlay');
    sb.classList.toggle('open');
    ov.classList.toggle('active');
  },

  closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
  }
};

// =====================================================================
// INIT
// =====================================================================
(function init() {
  // Set today's date
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('inspectionDate').value = today;

  renderSidebar();
  renderSelectionGrid();
})();
</script>
