<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — QatarSpec Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <style>
    :root { --navy: #0D1B3E; --gold: #C8922A; --bg: #0a0a0a; --card: #111; --text: #eee; --muted: #888; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 420px; padding: 20px; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { color: var(--gold); font-size: 1.8rem; }
    .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 5px; }
    .card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 30px; }
    .tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid #222; }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: 0.3s; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--muted); }
    input { width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: var(--text); font-size: 1rem; }
    input:focus { outline: none; border-color: var(--gold); }
    .btn { width: 100%; padding: 14px; background: var(--gold); color: var(--navy); border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn:hover { opacity: 0.9; }
    .message { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-size: 0.9rem; display: none; }
    .message.error { background: #331111; color: #ff6666; display: block; }
    .message.success { background: #113311; color: #66ff66; display: block; }
    .loading { opacity: 0.6; pointer-events: none; }
    .hint { text-align: center; margin-top: 15px; font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>QatarSpec Pro</h1>
      <p>نظام إدارة المشاريع</p>
    </div>
    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">تسجيل الدخول</div>
        <div class="tab" onclick="switchTab('register')">حساب جديد</div>
      </div>
      <form id="authForm">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="email" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="password" required placeholder="8 أحرف على الأقل" minlength="8">
        </div>
        <button type="submit" class="btn" id="submitBtn">تسجيل الدخول</button>
        <div class="message" id="message"></div>
      </form>
      <p class="hint">كلمة المرور يجب أن تكون 8 أحرف على الأقل</p>
    </div>
  </div>

  <script>
    let supabase = null;

    async function initSupabase() {
      try {
        const res = await fetch('/api/auth-config');
        const config = await res.json();
        supabase = window.supabase.createClient(config.url, config.key);
      } catch (e) {
        showMessage('خطأ في الاتصال بالخادم', 'error');
      }
    }
    initSupabase();

    let currentTab = 'login';

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('submitBtn').textContent = tab === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب';
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!supabase) return showMessage('جاري التحميل...', 'error');

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading');

      try {
        let result;
        if (currentTab === 'login') {
          result = await supabase.auth.signInWithPassword({ email, password });
        } else {
          result = await supabase.auth.signUp({ email, password });
        }

        if (result.error) throw result.error;

        if (currentTab === 'register') {
          showMessage('تم إنشاء الحساب! يمكنك الدخول الآن.', 'success');
        } else {
          // حفظ الـ token في sessionStorage حتى تجده projects-app.js
          const token = result.data?.session?.access_token;
          if (token) {
            sessionStorage.setItem('qs_session_token', token);
          }
          showMessage('تم الدخول بنجاح! جاري التوجيه...', 'success');
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get('redirect') || 'projects.html';
          setTimeout(() => window.location.href = '/' + redirect, 1000);
        }
      } catch (err) {
        showMessage(err.message || 'خطأ غير معروف', 'error');
      } finally {
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
