<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#E8C97A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#7A1515"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo circle -->
  <circle cx="120" cy="120" r="60" fill="#7A1515" opacity="0.8"/>
  <text x="120" y="135" text-anchor="middle" font-size="48">🏗️</text>
  <!-- Main title -->
  <text x="220" y="100" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#C9A84C">QatarSpec Pro</text>
  <text x="220" y="150" font-family="Arial, sans-serif" font-size="28" fill="#B0A898">دليل المواصفات الهندسية القطرية</text>
  <!-- Divider -->
  <rect x="60" y="200" width="1080" height="2" fill="#C9A84C" opacity="0.3"/>
  <!-- Features -->
  <text x="100" y="270" font-family="Arial, sans-serif" font-size="26" fill="#EDE8DC">✓ QCS 2024 الرسمي</text>
  <text x="100" y="320" font-family="Arial, sans-serif" font-size="26" fill="#EDE8DC">✓ Ashghal RDM 2023</text>
  <text x="100" y="370" font-family="Arial, sans-serif" font-size="26" fill="#EDE8DC">✓ KAHRAMAA 2024</text>
  <text x="500" y="270" font-family="Arial, sans-serif" font-size="26" fill="#EDE8DC">✓ 111+ قسم مرجعي</text>
  <text x="500" y="320" font-family="Arial, sans-serif" font-size="26" fill="#EDE8DC">✓ 38+ حاسبة هندسية</text>
  <text x="500" y="370" font-family="Arial, sans-serif" font-size="26" fill="#EDE8DC">✓ بحث ذكي بالذكاء الاصطناعي</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#7A1515" opacity="0.4"/>
  <text x="600" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#C9A84C">qatar-standers.vercel.app — للمهندسين في دولة قطر</text>
</svg>
