<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>اختبار Gemini API</title>
<style>
  body { font-family: monospace; background: #0d0d1a; color: #eee; padding: 20px; }
  button { background: #c8961a; border: none; padding: 10px 20px; color: #000; font-weight: bold; cursor: pointer; border-radius: 6px; margin: 5px; }
  pre { background: #1a1a2e; padding: 15px; border-radius: 8px; overflow: auto; font-size: 13px; border: 1px solid #333; }
  .ok { color: #22c55e; } .err { color: #ef4444; } .info { color: #60a5fa; }
</style>
</head>
<body>
<h2>🔬 اختبار Gemini API — QatarSpec Pro</h2>
<button onclick="testText()">1️⃣ اختبار نصي (بدون صورة)</button>
<button onclick="testImage()">2️⃣ اختبار مع صورة صغيرة</button>
<button onclick="testEnv()">3️⃣ تحقق من الـ ENV</button>
<pre id="out">اضغط أي زر للاختبار...</pre>

<script>
const out = document.getElementById('out');
function log(msg, cls) {
  out.innerHTML += `<span class="${cls||''}">${msg}</span>\n`;
}
function clear() { out.innerHTML = ''; }

async function testEnv() {
  clear();
  log('🔍 فحص /api/health ...', 'info');
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    log('Health: ' + JSON.stringify(d, null, 2), r.ok ? 'ok' : 'err');
  } catch(e) { log('❌ ' + e.message, 'err'); }
}

async function testText() {
  clear();
  log('📤 إرسال طلب نصي لـ /api/ai-proxy ...', 'info');
  try {
    const r = await fetch('/api/ai-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ messages: [{ role: 'user', content: 'قل "مرحبا" فقط' }] })
    });
    const d = await r.json();
    log('Status: ' + r.status, r.ok ? 'ok' : 'err');
    log('Response: ' + JSON.stringify(d, null, 2), r.ok ? 'ok' : 'err');
  } catch(e) { log('❌ ' + e.message, 'err'); }
}

async function testImage() {
  clear();
  log('📤 إرسال صورة صغيرة 1x1 لـ /api/vision-proxy ...', 'info');
  // صورة PNG بيضاء 1×1 بيكسل
  const tiny1x1 = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==';
  try {
    const r = await fetch('/api/vision-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        image: tiny1x1,
        mimeType: 'image/png',
        userMessage: 'صف هذه الصورة في كلمة واحدة'
      })
    });
    const text = await r.text();
    log('Status: ' + r.status, r.ok ? 'ok' : 'err');
    try {
      const d = JSON.parse(text);
      log('Response: ' + JSON.stringify(d, null, 2), r.ok ? 'ok' : 'err');
      if (d.hint) log('💡 Hint: ' + d.hint, 'info');
    } catch { log('Raw: ' + text, 'err'); }
  } catch(e) { log('❌ ' + e.message, 'err'); }
}
</script>
</body>
</html>
