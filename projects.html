<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاريعي — QatarSpec Pro</title>
<link rel="icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0D1B3E; --navy2:#0f2347; --gold:#C8922A; --gold2:#e0a83a;
    --bg:#070b14; --bg2:#0d1220; --bg3:#111827;
    --border:#1e2d4a; --border2:#2a3f62;
    --text:#e8eaf0; --text2:#b0b8cc; --text3:#6b7a99;
    --green:#1db954; --red:#e53935; --orange:#f57c00; --blue:#1565c0;
    --radius:12px; --shadow:0 4px 24px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:Tajawal,sans-serif;min-height:100vh}

  /* ── Header ── */
  header{background:rgba(13,27,62,.95);border-bottom:1px solid var(--border);
    backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;
    padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#a06820);
    border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .logo-text{font-size:16px;font-weight:700;color:var(--gold)}
  .logo-sub{font-size:10px;color:var(--text3);display:block;margin-top:-2px}
  .header-right{display:flex;align-items:center;gap:10px}
  .btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-family:Tajawal,sans-serif;
    font-weight:600;cursor:pointer;border:none;transition:.2s}
  .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn-gold{background:linear-gradient(135deg,var(--gold),#a06820);color:#000;font-weight:700}
  .btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px)}
  #userBadge{font-size:11px;color:var(--text3);background:var(--bg3);
    border:1px solid var(--border);border-radius:20px;padding:4px 12px}

  /* ── Login wall ── */
  #loginRequired{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:80vh;text-align:center;padding:40px 20px}
  .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;
    padding:40px;max-width:400px;width:100%}
  .login-icon{font-size:56px;margin-bottom:16px}
  .login-card h2{color:var(--gold);margin-bottom:8px;font-size:20px}
  .login-card p{color:var(--text3);font-size:14px;margin-bottom:24px}
  .form-group{margin-bottom:14px;text-align:right}
  .form-group label{font-size:12px;color:var(--text3);display:block;margin-bottom:5px}
  .form-input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border2);
    border-radius:8px;color:var(--text);font-family:Tajawal,sans-serif;font-size:14px;outline:none}
  .form-input:focus{border-color:var(--gold)}
  .btn-full{width:100%;padding:12px;border-radius:10px;font-size:15px;font-family:Tajawal,sans-serif;
    font-weight:700;cursor:pointer;border:none}
  .auth-toggle{margin-top:14px;font-size:13px;color:var(--text3)}
  .auth-toggle span{color:var(--gold);cursor:pointer;text-decoration:underline}
  #authError{color:var(--red);font-size:12px;margin-top:8px;display:none}
  #authSuccess{color:var(--green);font-size:12px;margin-top:8px;display:none}

  /* ── Main content ── */
  #dashboardContent{display:none;padding:24px 20px;max-width:1400px;margin:0 auto}

  /* ── Stats bar ── */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 20px;display:flex;align-items:center;gap:14px;transition:.2s}
  .stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
  .stat-icon{font-size:28px;line-height:1}
  .stat-val{font-size:22px;font-weight:900;line-height:1}
  .stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}

  /* ── Toolbar ── */
  .toolbar{display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:12px;margin-bottom:20px}
  .toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .page-title{font-size:20px;font-weight:800;color:var(--text)}
  .filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .filter-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-family:Tajawal,sans-serif;
    cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:.2s}
  .filter-tab:hover,.filter-tab.active{background:rgba(200,146,42,.15);border-color:var(--gold);color:var(--gold)}
  .search-box{padding:8px 14px;background:var(--bg2);border:1px solid var(--border2);
    border-radius:8px;color:var(--text);font-family:Tajawal,sans-serif;font-size:13px;
    outline:none;width:200px}
  .search-box:focus{border-color:var(--gold)}
  .btn-new{padding:9px 18px;background:linear-gradient(135deg,var(--gold),#a06820);
    color:#000;border:none;border-radius:10px;font-size:13px;font-family:Tajawal,sans-serif;
    font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
  .btn-new:hover{filter:brightness(1.1);transform:translateY(-1px)}

  /* ── Projects grid ── */
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}

  .project-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
    overflow:hidden;cursor:pointer;transition:.25s;position:relative}
  .project-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:var(--shadow)}
  .project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .project-card.active::before{background:linear-gradient(90deg,var(--green),#15803d)}
  .project-card.on_hold::before{background:linear-gradient(90deg,var(--orange),#c2410c)}
  .project-card.completed::before{background:linear-gradient(90deg,var(--blue),#1e40af)}
  .project-card.cancelled::before{background:linear-gradient(90deg,#555,#333)}

  .card-header{padding:16px 18px 12px;border-bottom:1px solid var(--border)}
  .card-type-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
    background:rgba(200,146,42,.12);color:var(--gold);border:1px solid rgba(200,146,42,.25);
    display:inline-block;margin-bottom:8px}
  .card-name{font-size:16px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:4px}
  .card-client{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}

  .card-body{padding:14px 18px}
  .card-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .meta-item{background:var(--bg3);border-radius:8px;padding:8px 10px}
  .meta-label{font-size:10px;color:var(--text3);margin-bottom:2px}
  .meta-value{font-size:13px;font-weight:700;color:var(--text)}

  .card-progress{margin-bottom:12px}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;
    color:var(--text3);margin-bottom:5px}
  .progress-bar{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;border-radius:4px;transition:.5s;
    background:linear-gradient(90deg,var(--gold),var(--gold2))}

  .card-footer{padding:10px 18px;border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between}
  .status-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
  .status-active{background:rgba(29,185,84,.15);color:var(--green);border:1px solid rgba(29,185,84,.3)}
  .status-on_hold{background:rgba(245,124,0,.15);color:var(--orange);border:1px solid rgba(245,124,0,.3)}
  .status-completed{background:rgba(21,101,192,.15);color:#60a5fa;border:1px solid rgba(21,101,192,.3)}
  .status-cancelled{background:rgba(100,100,100,.15);color:#888;border:1px solid rgba(100,100,100,.3)}
  .card-actions{display:flex;gap:6px}
  .card-btn{background:none;border:1px solid var(--border);border-radius:6px;
    padding:4px 8px;font-size:11px;color:var(--text3);cursor:pointer;transition:.2s;
    font-family:Tajawal,sans-serif}
  .card-btn:hover{border-color:var(--gold);color:var(--gold)}
  .card-btn.danger:hover{border-color:var(--red);color:var(--red)}

  /* ── Empty state ── */
  .empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
  .empty-icon{font-size:64px;margin-bottom:16px;opacity:.5}
  .empty-title{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px}
  .empty-sub{font-size:14px;margin-bottom:24px}

  /* ── Loading ── */
  .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
    background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skel-card{height:220px;border-radius:16px}

  /* ── Modal ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
    z-index:1000;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;
    width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:16px;font-weight:800;color:var(--gold)}
  .modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer}
  .modal-body{padding:24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--border);
    display:flex;gap:10px;justify-content:flex-end}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .modal-grid .full{grid-column:1/-1}
  label{font-size:12px;color:var(--text3);display:block;margin-bottom:5px;font-weight:600}
  input,select,textarea{width:100%;padding:10px 12px;background:var(--bg3);
    border:1px solid var(--border2);border-radius:8px;color:var(--text);
    font-family:Tajawal,sans-serif;font-size:14px;outline:none;transition:.2s}
  input:focus,select:focus,textarea:focus{border-color:var(--gold)}
  select option{background:var(--bg3)}

  /* ── Toast ── */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
    background:var(--bg2);border:1px solid var(--border);border-radius:12px;
    padding:12px 24px;font-size:14px;z-index:9999;transition:.35s;
    box-shadow:var(--shadow);display:flex;align-items:center;gap:8px}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.success{border-color:var(--green);color:var(--green)}
  #toast.error{border-color:var(--red);color:var(--red)}

  /* ── Alerts ── */
  #alertBar{display:none;background:rgba(229,57,53,.08);border:1px solid rgba(229,57,53,.3);
    border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:#ef9a9a}

  @media(max-width:600px){
    .stats-grid{grid-template-columns:repeat(2,1fr)}
    .modal-grid{grid-template-columns:1fr}
    .modal-grid .full{grid-column:1}
    .projects-grid{grid-template-columns:1fr}
    .search-box{width:140px}
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <a href="/index.html" class="logo">
    <div class="logo-icon">🏗</div>
    <div>
      <span class="logo-text">QatarSpec Pro</span>
      <span class="logo-sub">لوحة المشاريع</span>
    </div>
  </a>
  <div class="header-right">
    <span id="userBadge">...</span>
    <button class="btn-sm btn-ghost" onclick="APP.logout()">خروج</button>
    <a href="/index.html" class="btn-sm btn-ghost">🏠 الرئيسية</a>
  </div>
</header>

<!-- Login Wall -->
<div id="loginRequired">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2 id="authTitle">تسجيل الدخول</h2>
    <p id="authSubtitle">ادخل لحسابك للوصول لمشاريعك</p>
    <div id="signupFields" style="display:none">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input class="form-input" id="authName" type="text" placeholder="محمد العنزي">
      </div>
    </div>
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input class="form-input" id="authEmail" type="email" placeholder="name@example.com" dir="ltr">
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input class="form-input" id="authPass" type="password" placeholder="••••••••" dir="ltr">
    </div>
    <div id="authError"></div>
    <div id="authSuccess"></div>
    <button class="btn-full btn-gold" style="margin-top:8px" onclick="APP.submitAuth()">
      <span id="authBtnText">تسجيل الدخول</span>
    </button>
    <div class="auth-toggle">
      <span id="authToggleText">ليس لديك حساب؟</span>
      <span onclick="APP.toggleAuth()"> <span id="authToggleLink">إنشاء حساب</span></span>
    </div>
  </div>
</div>

<!-- App Content -->
<div id="dashboardContent">

  <!-- Alert bar -->
  <div id="alertBar"></div>

  <!-- Stats -->
  <div class="stats-grid" id="projectStats">
    <div class="stat-card skeleton skel-card"></div>
    <div class="stat-card skeleton skel-card"></div>
    <div class="stat-card skeleton skel-card"></div>
    <div class="stat-card skeleton skel-card"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="page-title">مشاريعي</span>
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all" onclick="APP.filter('all',this)">الكل</button>
        <button class="filter-tab" data-filter="active" onclick="APP.filter('active',this)">نشط</button>
        <button class="filter-tab" data-filter="on_hold" onclick="APP.filter('on_hold',this)">متوقف</button>
        <button class="filter-tab" data-filter="completed" onclick="APP.filter('completed',this)">مكتمل</button>
      </div>
      <input class="search-box" id="searchBox" type="search" placeholder="🔍 بحث..." oninput="APP.search(this.value)">
    </div>
    <button class="btn-new" onclick="APP.openModal()">
      <span style="font-size:18px">＋</span> مشروع جديد
    </button>
  </div>

  <!-- Dashboard stats (phase9) -->
  <div id="dashboard-stats" style="margin-bottom:16px"></div>

  <!-- Projects grid -->
  <div class="projects-grid" id="projectsGrid"></div>
</div>

<!-- Modal: إنشاء / تعديل مشروع -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">مشروع جديد</span>
      <button class="modal-close" onclick="APP.closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-grid" id="projectForm">
        <div class="full">
          <label>اسم المشروع *</label>
          <input id="f_name" type="text" placeholder="مثال: فيلا الدوحة — بلوك 22">
        </div>
        <div>
          <label>العميل</label>
          <input id="f_client" type="text" placeholder="اسم العميل">
        </div>
        <div>
          <label>الموقع</label>
          <input id="f_location" type="text" placeholder="المنطقة، قطر">
        </div>
        <div>
          <label>نوع المشروع</label>
          <select id="f_type">
            <option value="villa">🏠 فيلا</option>
            <option value="building">🏢 مبنى</option>
            <option value="road">🛣 طريق</option>
            <option value="maintenance">🔧 صيانة</option>
            <option value="infrastructure">⚙️ بنية تحتية</option>
            <option value="other">📋 أخرى</option>
          </select>
        </div>
        <div>
          <label>قيمة العقد (QAR)</label>
          <input id="f_contract_value" type="number" placeholder="0">
        </div>
        <div>
          <label>تاريخ البدء</label>
          <input id="f_start_date" type="date">
        </div>
        <div>
          <label>تاريخ الانتهاء</label>
          <input id="f_end_date" type="date">
        </div>
        <div>
          <label>الحالة</label>
          <select id="f_status">
            <option value="active">✅ نشط</option>
            <option value="on_hold">⏸ متوقف</option>
            <option value="completed">🏁 مكتمل</option>
          </select>
        </div>
        <div class="full">
          <label>ملاحظات</label>
          <textarea id="f_notes" rows="3" placeholder="ملاحظات إضافية..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sm btn-ghost" onclick="APP.closeModal()">إلغاء</button>
      <button class="btn-sm btn-gold" id="submitBtn" onclick="APP.saveProject()">حفظ المشروع</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/js/projects-app.js"></script>
<script src="/js/project-phase9.js" defer></script>
<script>
/* ── window.APP bridge — يربط HTML مع QS_Projects + QS_Projects_UI ── */
(function() {
  'use strict';

  let _isSignup = false;

  window.APP = {
    logout() {
      if (!confirm('هل تريد تسجيل الخروج؟')) return;
      if (window.QS_Projects) window.QS_Projects.logout();
    },
    openModal() {
      if (window.QS_Projects_UI) window.QS_Projects_UI.openModal();
    },
    closeModal() {
      if (window.QS_Projects_UI) window.QS_Projects_UI.closeModal();
    },
    saveProject() {
      // يُطلق handleFormSubmit عبر submit event
      const form = document.getElementById('projectForm');
      if (form) { form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true })); return; }
      // fallback: استدعاء مباشر
      if (window.QS_Projects_UI) window.QS_Projects_UI.saveProject?.();
    },
    filter(val, el) {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      if (window.QS_Projects_UI) window.QS_Projects_UI.setFilter?.(val);
      else {
        // fallback direct render
        const grid = document.getElementById('projectsGrid');
        if (!grid) return;
      }
    },
    search(q) {
      const grid = document.getElementById('projectsGrid');
      if (!grid) return;
      const cards = grid.querySelectorAll('.project-card');
      cards.forEach(c => {
        const txt = c.textContent.toLowerCase();
        c.style.display = txt.includes(q.toLowerCase()) ? '' : 'none';
      });
    },
    toggleAuth() {
      _isSignup = !_isSignup;
      const sf = document.getElementById('signupFields');
      const title = document.getElementById('authTitle');
      const sub = document.getElementById('authSubtitle');
      const btnTxt = document.getElementById('authBtnText');
      const toggleTxt = document.getElementById('authToggleText');
      const toggleLink = document.getElementById('authToggleLink');
      if (_isSignup) {
        if (sf) sf.style.display = 'block';
        if (title) title.textContent = 'إنشاء حساب جديد';
        if (sub) sub.textContent = 'أنشئ حسابك للبدء';
        if (btnTxt) btnTxt.textContent = 'إنشاء الحساب';
        if (toggleTxt) toggleTxt.textContent = 'لديك حساب؟';
        if (toggleLink) toggleLink.textContent = 'تسجيل الدخول';
      } else {
        if (sf) sf.style.display = 'none';
        if (title) title.textContent = 'تسجيل الدخول';
        if (sub) sub.textContent = 'ادخل لحسابك للوصول لمشاريعك';
        if (btnTxt) btnTxt.textContent = 'تسجيل الدخول';
        if (toggleTxt) toggleTxt.textContent = 'ليس لديك حساب؟';
        if (toggleLink) toggleLink.textContent = 'إنشاء حساب';
      }
    },
    async submitAuth() {
      const email = document.getElementById('authEmail')?.value?.trim();
      const pass  = document.getElementById('authPass')?.value?.trim();
      const name  = document.getElementById('authName')?.value?.trim();
      const errEl = document.getElementById('authError');
      const sucEl = document.getElementById('authSuccess');
      const btn   = document.getElementById('authBtnText');

      if (!email || !pass) { if (errEl) errEl.textContent = 'البريد وكلمة المرور مطلوبان'; return; }
      if (errEl) errEl.textContent = '';
      if (sucEl) sucEl.textContent = '';
      if (btn) btn.textContent = 'جاري...';

      try {
        // 1. اجلب Supabase config من auth-config
        let sbUrl = window.__SUPABASE_URL__ || document.querySelector('meta[name="supabase-url"]')?.content;
        let sbKey = window.__SUPABASE_ANON__ || document.querySelector('meta[name="supabase-anon"]')?.content;

        if (!sbUrl || !sbKey) {
          const cfg = await fetch('/api/auth-config').then(r => r.json());
          sbUrl = cfg.url; sbKey = cfg.key;
        }
        if (!sbUrl || !sbKey) throw new Error('Supabase غير مهيأ — تحقق من إعدادات البيئة');

        // 2. استدعاء Supabase Auth مباشرة
        const endpoint = _isSignup ? 'signup' : 'token?grant_type=password';
        const body = _isSignup
          ? { email, password: pass, data: { full_name: name || '' } }
          : { email, password: pass };

        const res = await fetch(`${sbUrl}/auth/v1/${endpoint}`, {
          method: 'POST',
          headers: { 'apikey': sbKey, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (!res.ok) {
          const msg = data?.error_description || data?.msg || data?.error || 'فشل المصادقة';
          throw new Error(msg);
        }

        if (_isSignup) {
          if (sucEl) sucEl.textContent = '✅ تم إنشاء الحساب — يرجى تسجيل الدخول الآن';
          APP.toggleAuth(); // الرجوع لشاشة الدخول
        } else {
          const token = data.access_token;
          const user  = data.user || { email };
          // حفظ في sessionStorage وتهيئة الـ app
          sessionStorage.setItem('qs_session_token', token);
          if (window.QS_Projects) window.QS_Projects.setSession(token, user);
        }

      } catch (err) {
        if (errEl) errEl.textContent = err.message || 'خطأ في المصادقة';
      } finally {
        if (btn) btn.textContent = _isSignup ? 'إنشاء الحساب' : 'تسجيل الدخول';
      }
    }
  };

  // تهيئة phase9 dashboard stats
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      if (window.QS_Phase9) {
        const el = document.getElementById('dashboard-stats');
        if (el) QS_Phase9.initDashboardStats(el);
      }
    }, 2000);
  });
})();
</script>
<script src="/chatbot-widget.js"></script>
</body>
</html>
