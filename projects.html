<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاريعي — QatarSpec Pro</title>
<meta name="description" content="لوحة إدارة المشاريع الهندسية — QatarSpec Pro">
<meta name="robots" content="noindex">

<!-- نفس خطوط التطبيق الرئيسي -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ── CSS Variables (مطابق للتطبيق الرئيسي) ── */
:root {
  --maroon: #7A1515; --maroon2: #5A0F0F;
  --gold: #C9A84C; --gold2: #E8C97A;
  --dark: #0A0A0A; --dark2: #111111; --dark3: #181818; --dark4: #222222; --dark5: #2A2A2A;
  --text: #EDE8DC; --text2: #B0A898; --text3: #6A6258;
  --border: rgba(201,168,76,0.12); --border2: rgba(201,168,76,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
}
.header-inner {
  max-width: 1300px; margin: 0 auto;
  display: flex; align-items: center;
  justify-content: space-between; height: 64px;
}
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-mark {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--maroon), var(--maroon2));
  border-radius: 10px; display: flex; align-items: center;
  justify-content: center; font-size: 20px;
  border: 1px solid rgba(201,168,76,0.25);
  box-shadow: 0 0 24px rgba(122,21,21,0.4);
}
.logo-name { font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700; color: var(--gold); line-height: 1.1; }
.logo-sub { font-size: 10px; color: var(--text3); font-weight: 400; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.header-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--dark3); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px;
  font-size: 12px; color: var(--text2);
  cursor: pointer; transition: .2s;
  font-family: 'Tajawal', sans-serif; text-decoration: none;
}
.header-btn:hover { border-color: var(--border2); color: var(--text); }
.header-btn.primary {
  background: linear-gradient(135deg, var(--maroon), var(--maroon2));
  border-color: rgba(201,168,76,0.3);
  color: var(--gold2); font-weight: 600;
}
.user-name { font-size: 13px; color: var(--text2); }

/* ── صفحة تتطلب تسجيل الدخول ── */
#loginRequired {
  min-height: calc(100vh - 64px);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px;
}
.login-card {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 48px 40px;
  max-width: 420px; width: 100%;
}
.login-icon { font-size: 56px; margin-bottom: 20px; }
.login-title { font-family: 'Cairo', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
.login-desc { font-size: 14px; color: var(--text3); line-height: 1.7; margin-bottom: 28px; }
.btn-login {
  display: block; width: 100%;
  background: linear-gradient(135deg, var(--maroon), var(--maroon2));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 12px; padding: 14px;
  color: var(--gold2); font-family: 'Tajawal', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  text-decoration: none; text-align: center;
  transition: .3s;
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(122,21,21,0.4); }

/* ── Dashboard ── */
#dashboardContent { display: none; }
.page-wrap { max-width: 1300px; margin: 0 auto; padding: 32px 28px; }

/* Page Header */
.page-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 32px;
  flex-wrap: wrap; gap: 16px;
}
.page-title { font-family: 'Cairo', sans-serif; font-size: 28px; font-weight: 900; color: var(--text); }
.page-subtitle { font-size: 13px; color: var(--text3); margin-top: 4px; }

.btn-new-project {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--maroon), var(--maroon2));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 12px; padding: 12px 24px;
  color: var(--gold2); font-family: 'Tajawal', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: .3s; white-space: nowrap;
}
.btn-new-project:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(122,21,21,0.4); }

/* Stats Grid */
#projectStats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 16px; margin-bottom: 32px;
}

/* Filter Bar */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 24px; flex-wrap: wrap;
}
.filter-btn {
  background: var(--dark3); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 16px;
  font-size: 12px; color: var(--text2);
  cursor: pointer; transition: .2s;
  font-family: 'Tajawal', sans-serif;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--gold);
  color: var(--gold2);
  background: rgba(201,168,76,0.08);
}

/* Projects Grid */
#projectsGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

/* ── Modal ── */
#projectModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 1000;
  align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(8px);
  opacity: 0; transition: opacity .3s;
}
#projectModal.open { opacity: 1; }
.modal-box {
  background: var(--dark2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 28px;
  width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(20px); transition: transform .3s;
  scrollbar-width: thin; scrollbar-color: var(--dark5) transparent;
}
#projectModal.open .modal-box { transform: translateY(0); }
.modal-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 24px;
}
.modal-title { font-family: 'Cairo', sans-serif; font-size: 20px; font-weight: 800; color: var(--text); }
.modal-close {
  background: var(--dark4); border: 1px solid var(--border);
  border-radius: 8px; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text3);
  transition: .2s;
}
.modal-close:hover { color: var(--text); border-color: var(--border2); }

/* Form */
.form-group { margin-bottom: 18px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-label {
  display: block; font-size: 12px;
  color: var(--text3); margin-bottom: 7px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  font-family: 'Tajawal', sans-serif; font-size: 14px;
  color: var(--text); outline: none; transition: .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--border2);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.06);
}
.form-select { appearance: none; cursor: pointer; }
.form-textarea { resize: vertical; min-height: 80px; }
.form-input::placeholder { color: var(--text3); }

/* خيارات Select */
.form-select option { background: var(--dark3); color: var(--text); }

.form-actions {
  display: flex; gap: 10px; margin-top: 24px;
  padding-top: 20px; border-top: 1px solid var(--border);
}
.btn-submit {
  flex: 1;
  background: linear-gradient(135deg, var(--maroon), var(--maroon2));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 10px; padding: 12px;
  color: var(--gold2); font-family: 'Tajawal', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: .2s;
}
.btn-submit:hover { transform: translateY(-1px); }
.btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn-cancel {
  background: var(--dark4); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px;
  color: var(--text2); font-family: 'Tajawal', sans-serif;
  font-size: 14px; cursor: pointer; transition: .2s;
}
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }

/* ── Toast Animation ── */
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header { padding: 0 16px; }
  .page-wrap { padding: 20px 16px; }
  .page-title { font-size: 22px; }
  .form-row { grid-template-columns: 1fr; gap: 0; }
  #projectsGrid { grid-template-columns: 1fr; }
  .modal-box { padding: 20px; }
  #projectStats { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <a href="index.html" class="logo" aria-label="QatarSpec Pro — الرئيسية">
      <div class="logo-mark">🏗️</div>
      <div>
        <div class="logo-name">QatarSpec Pro</div>
        <div class="logo-sub">لوحة المشاريع</div>
      </div>
    </a>

    <nav class="header-actions" aria-label="إجراءات الصفحة">
      <span class="user-name">👤 <span id="userDisplayName">مهندس</span></span>
      <a href="index.html" class="header-btn">🏠 الرئيسية</a>
      <button class="header-btn" onclick="QS_Projects_UI.logout()">خروج 🚪</button>
    </nav>
  </div>
</header>

<!-- ── يتطلب تسجيل الدخول ──────────────────────────────────────────── -->
<div id="loginRequired">
  <div class="login-card">
    <div class="login-icon">🔒</div>
    <div class="login-title">تسجيل الدخول مطلوب</div>
    <div class="login-desc">
      يجب تسجيل الدخول للوصول إلى لوحة المشاريع<br>
      وإدارة مشاريعك الهندسية في قطر
    </div>
    <a href="login.html?redirect=projects.html" class="btn-login">
      🔑 تسجيل الدخول / إنشاء حساب
    </a>
  </div>
</div>

<!-- ── Dashboard المشاريع ──────────────────────────────────────────── -->
<div id="dashboardContent">
  <div class="page-wrap">

    <!-- رأس الصفحة -->
    <div class="page-header">
      <div>
        <div class="page-title">📊 مشاريعي</div>
        <div class="page-subtitle">إدارة المشاريع الهندسية — وفق QCS 2024 وأشغال</div>
      </div>
      <button class="btn-new-project" onclick="QS_Projects_UI.openModal()">
        ＋ مشروع جديد
      </button>
    </div>

    <!-- الإحصائيات -->
    <div id="projectStats"></div>

    <!-- شريط الفلتر -->
    <div class="filter-bar" role="group" aria-label="تصفية المشاريع">
      <span style="font-size:12px;color:var(--text3);margin-left:4px">تصفية:</span>
      <button class="filter-btn active" data-filter="all" onclick="QS_Projects_UI.setFilter('all')">الكل</button>
      <button class="filter-btn" data-filter="active" onclick="QS_Projects_UI.setFilter('active')">🟢 نشطة</button>
      <button class="filter-btn" data-filter="on_hold" onclick="QS_Projects_UI.setFilter('on_hold')">🟡 موقوفة</button>
      <button class="filter-btn" data-filter="completed" onclick="QS_Projects_UI.setFilter('completed')">⚪ مكتملة</button>
      <button class="filter-btn" data-filter="villa" onclick="QS_Projects_UI.setFilter('villa')">🏠 فلل</button>
      <button class="filter-btn" data-filter="road" onclick="QS_Projects_UI.setFilter('road')">🛣️ طرق</button>
      <button class="filter-btn" data-filter="maintenance" onclick="QS_Projects_UI.setFilter('maintenance')">🔧 صيانة</button>
    </div>

    <!-- شبكة المشاريع -->
    <div id="projectsGrid" role="list" aria-label="قائمة المشاريع"></div>

  </div>
</div>

<!-- ── Modal إنشاء/تعديل مشروع ──────────────────────────────────── -->
<div id="projectModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">مشروع جديد</div>
      <button class="modal-close" onclick="QS_Projects_UI.closeModal()" aria-label="إغلاق">✕</button>
    </div>

    <form id="projectForm" novalidate>

      <!-- اسم المشروع -->
      <div class="form-group">
        <label class="form-label" for="f_name">اسم المشروع *</label>
        <input id="f_name" type="text" class="form-input"
               placeholder="مثال: مشروع فيلا الدوحة — قطعة 23" required>
      </div>

      <div class="form-row">
        <!-- العميل -->
        <div class="form-group">
          <label class="form-label" for="f_client">العميل / الجهة</label>
          <input id="f_client" type="text" class="form-input" placeholder="اسم المالك أو الجهة">
        </div>
        <!-- الموقع -->
        <div class="form-group">
          <label class="form-label" for="f_location">الموقع</label>
          <input id="f_location" type="text" class="form-input" placeholder="المنطقة، البلدية">
        </div>
      </div>

      <div class="form-row">
        <!-- نوع المشروع -->
        <div class="form-group">
          <label class="form-label" for="f_type">نوع المشروع</label>
          <select id="f_type" class="form-select">
            <option value="villa">🏠 فيلا / مسكن</option>
            <option value="building">🏢 مبنى تجاري</option>
            <option value="road">🛣️ طريق / بنية تحتية</option>
            <option value="maintenance">🔧 صيانة</option>
            <option value="infrastructure">⚡ مرافق عامة</option>
            <option value="other">📋 أخرى</option>
          </select>
        </div>
        <!-- الحالة -->
        <div class="form-group">
          <label class="form-label" for="f_status">الحالة</label>
          <select id="f_status" class="form-select">
            <option value="active">🟢 نشط</option>
            <option value="on_hold">🟡 موقوف مؤقتاً</option>
            <option value="completed">⚪ مكتمل</option>
          </select>
        </div>
      </div>

      <!-- قيمة العقد -->
      <div class="form-group">
        <label class="form-label" for="f_contract_value">قيمة العقد (ريال قطري)</label>
        <input id="f_contract_value" type="number" class="form-input"
               placeholder="0.00" min="0" step="1000">
      </div>

      <div class="form-row">
        <!-- تاريخ البدء -->
        <div class="form-group">
          <label class="form-label" for="f_start_date">تاريخ البدء</label>
          <input id="f_start_date" type="date" class="form-input">
        </div>
        <!-- تاريخ الانتهاء -->
        <div class="form-group">
          <label class="form-label" for="f_end_date">تاريخ الانتهاء المتوقع</label>
          <input id="f_end_date" type="date" class="form-input">
        </div>
      </div>

      <!-- ملاحظات -->
      <div class="form-group">
        <label class="form-label" for="f_notes">ملاحظات</label>
        <textarea id="f_notes" class="form-textarea"
                  placeholder="أي معلومات إضافية عن المشروع..."></textarea>
      </div>

      <!-- أزرار -->
      <div class="form-actions">
        <button type="submit" id="submitBtn" class="btn-submit">💾 حفظ المشروع</button>
        <button type="button" class="btn-cancel" onclick="QS_Projects_UI.closeModal()">إلغاء</button>
      </div>

    </form>
  </div>
</div>

<!-- ── JavaScript ────────────────────────────────────────────────────── -->
<script src="js/projects-app.js"></script>

</body>
</html>
