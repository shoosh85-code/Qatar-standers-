name: k6 Load Tests — QatarSpec Pro

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  k6-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create k6 results directory
        run: mkdir -p tests/k6/results

      - name: Run k6 — ai-proxy
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/k6/ai-proxy.js
        env:
          BASE_URL: https://qatar-standers.vercel.app
          USER_TIER: free
        continue-on-error: true

      - name: Run k6 — qcs-search
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/k6/qcs-search.js
        env:
          BASE_URL: https://qatar-standers.vercel.app
          USER_TIER: free
        continue-on-error: true

      - name: Run k6 — vision-proxy
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/k6/vision-proxy.js
        env:
          BASE_URL: https://qatar-standers.vercel.app
          USER_TIER: free
        continue-on-error: true
