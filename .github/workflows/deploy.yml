name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          RESULT=$(curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Result: $RESULT"
          STATE=$(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('job',{}).get('state','unknown'))" 2>/dev/null || echo "unknown")
          echo "Deploy state: $STATE"
          if [ "$STATE" = "PENDING" ] || [ "$STATE" = "BUILDING" ]; then
            echo "✅ Deploy triggered successfully"
          else
            echo "❌ Deploy may have failed: $RESULT"
            exit 1
          fi
