name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_BUn6M6L492W1COsvFHruMx4X
          vercel-project-id: prj_FbGrivFCdfJvoFycGRMd1U0ECq5D
          vercel-args: '--prod'
          working-directory: ./
