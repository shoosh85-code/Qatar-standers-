name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Vercel Production
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=shoosh85-3851s-projects
        env:
          VERCEL_ORG_ID: team_BUn6M6L492W1COsvFHruMx4X
          VERCEL_PROJECT_ID: prj_FbGrivFCdfJvoFycGRMd1U0ECq5D
