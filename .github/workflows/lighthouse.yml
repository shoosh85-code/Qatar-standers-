name: Lighthouse CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # كل إثنين الساعة 6 صباحاً

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://qatar-standers.vercel.app
            https://qatar-standers.vercel.app/projects.html
            https://qatar-standers.vercel.app/boq-pricer.html
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🔦 Lighthouse Results\n✅ Audit complete — check artifacts for full report'
            })
