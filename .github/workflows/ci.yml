name: CI — QatarSpec Pro Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run content integrity tests
        run: npm run test:content

      - name: Check for .bak files
        run: |
          BAK=$(find . -name "*.bak" -not -path "./.git/*")
          if [ -n "$BAK" ]; then
            echo "❌ Found .bak files: $BAK"
            exit 1
          fi
          echo "✅ No .bak files found"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check main file sizes
        run: |
          echo "=== File Sizes ==="
          ls -lah *.js *.html 2>/dev/null | awk '{print $5, $9}'

          # index.html يجب أن يكون أقل من 2MB
          SIZE=$(wc -c < index.html)
          if [ "$SIZE" -gt 2000000 ]; then
            echo "❌ index.html too large: ${SIZE} bytes (max 2MB)"
            exit 1
          fi
          echo "✅ index.html size OK: ${SIZE} bytes"
