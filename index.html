<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل المواصفات القطرية | Qatar Engineering Standards</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #7A1515; --maroon2: #5A0F0F; --gold: #C9A84C; --gold2: #E8C97A;
            --dark: #0A0A0A; --dark2: #111111; --dark3: #181818; --dark4: #222222;
            --text: #EDE8DC; --text2: #B0A898; --text3: #6A6258; --border: rgba(201,168,76,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        body::after { content:''; position:fixed; inset:0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; opacity:0.4; }
        
        header { position: sticky; top:0; z-index:100; background: rgba(10,10,10,0.92); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); padding: 0 28px; }
        .header-inner { max-width: 1300px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px; }
        .logo { display:flex; align-items:center; gap:12px; }
        .logo-mark { width:40px; height:40px; background: linear-gradient(135deg, var(--maroon), var(--maroon2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; border:1px solid rgba(201,168,76,0.25); }
        .logo-name { font-family:'Cairo',sans-serif; font-size:16px; font-weight:700; color: var(--gold); }
        
        .hero { max-width:1300px; margin:0 auto; padding: 56px 28px 36px; display:grid; grid-template-columns:1fr 1fr; gap:48px; }
        .upload-zone { background: var(--dark3); border:2px dashed rgba(201,168,76,0.2); border-radius:20px; padding:36px; text-align:center; cursor:pointer; }
        
        .search-section { max-width:1300px; margin:0 auto; padding:0 28px 40px; }
        .search-input { width:100%; background:var(--dark3); border:1px solid var(--border); border-radius:14px; padding:18px; color:#fff; outline:none; }
        
        .cats-grid { max-width: 1300px; margin: 0 auto; display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px; padding:0 28px; }
        .cat-card { background:var(--dark3); border:1px solid var(--border); border-radius:16px; padding:22px; cursor:pointer; transition:.3s; }
        .cat-card:hover { border-color:var(--gold); transform:translateY(-3px); }
        
        .detail-modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
        .detail-modal-bg.open { display:flex; }
        .detail-modal { background:var(--dark3); border:1px solid var(--border2); border-radius:20px; padding:32px; max-width:700px; width:100%; max-height:85vh; overflow-y:auto; }
        .dm-table { width:100%; border-collapse:collapse; margin:15px 0; }
        .dm-table th, .dm-table td { border:1px solid var(--border); padding:12px; text-align:right; font-size:13px; }
        .dm-table th { background:rgba(201,168,76,0.1); color:var(--gold); }
        .spec-point { background:rgba(201,168,76,0.05); border-right:3px solid var(--gold); padding:10px; margin:10px 0; font-size:14px; }
        .dm-close { cursor:pointer; float:left; background:var(--dark4); padding:5px 12px; border-radius:8px; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <div class="logo-mark">🏗️</div>
            <div class="logo-name">دليل المواصفات القطرية</div>
        </div>
        <div id="keyStatus" style="font-size:12px; color:var(--gold)">AI Active ✓</div>
    </div>
</header>

<div class="hero">
    <div>
        <h1 style="font-size:40px; font-family:'Cairo'">كل المواصفات في <span>مكان واحد</span></h1>
        <p style="color:var(--text2); margin-top:15px">تطبيق المفتش الفني الميداني - دقة 100%</p>
    </div>
    <div class="upload-zone">
        <div style="font-size:30px">📄</div>
        <div style="margin-top:10px">ارفع ملفات QCS هنا للبحث الذكي</div>
    </div>
</div>

<div class="search-section">
    <input type="text" class="search-input" placeholder="اسأل أي سؤال في المواصفات القطرية...">
</div>

<div class="cats-grid">
    <div class="cat-card" onclick="openDetail('roads')">
        <span style="font-size:30px">🛣️</span>
        <h3 style="margin-top:10px">أعمال الطرق والأسفلت</h3>
        <p style="font-size:13px; color:var(--text3)">الطبقات، الرش، الكبس، ودرجات الحرارة</p>
    </div>
    <div class="cat-card" onclick="openDetail('utilities')">
        <span style="font-size:30px">🔧</span>
        <h3 style="margin-top:10px">شبكات المرافق</h3>
        <p style="font-size:13px; color:var(--text3)">مياه، صرف صحي، وتصريف أمطار</p>
    </div>
</div>

<div class="detail-modal-bg" id="detailModal" onclick="closeModal(event)">
    <div class="detail-modal">
        <span class="dm-close" onclick="document.getElementById('detailModal').classList.remove('open')">إغلاق ✕</span>
        <div id="dmTitle" style="font-size:22px; color:var(--gold); font-family:'Cairo'; margin-bottom:20px"></div>
        <div id="dmContent" style="line-height:1.8"></div>
    </div>
</div>

<script>
    const sectionsContent = {
        'roads': {
            title: "أعمال الطرق والأسفلت (QCS Section 6)",
            content: `
                <h3>1. طبقات الأساس (Subgrade & Roadbase)</h3>
                <div class="spec-point">🔹 <strong>الكبس:</strong> 95% لطبقة الـ Subgrade و 100% لطبقة الـ Roadbase (Modified Proctor).</div>
                <div class="spec-point">🔹 <strong>تفاوت المنسوب:</strong> المسموح به في الـ Roadbase هو <strong>± 6 ملم</strong> فقط.</div>
                <div class="spec-point">🔹 <strong>الاستواء:</strong> استخدام مسطرة 3 متر بحيث لا يتجاوز الانحراف 6 ملم.</div>

                <h3>2. رش المواد البيتومينية (Bituminous Sprays)</h3>
                <table class="dm-table">
                    <tr><th>المادة</th><th>الموقع</th><th>معدل الرش (L/m2)</th></tr>
                    <tr><td>Prime Coat (MC70)</td><td>فوق الـ Roadbase</td><td>0.65 - 1.75</td></tr>
                    <tr><td>Tack Coat (K1-70)</td><td>بين طبقات الأسفلت</td><td>0.10 - 0.35</td></tr>
                </table>

                <h3>3. مواصفات الأسفلت الميدانية</h3>
                <div class="spec-point">🔹 <strong>الحرارة:</strong> لا تقل عن <strong>145°C</strong> عند الوصول، ولا تقل عن 120°C عند الكبس.</div>
                <div class="spec-point">🔹 <strong>عينة الـ Core:</strong> عينة لكل 1000 م2؛ الكبس المطلوب 97% إلى 101% من كثافة مارشال.</div>
            `
        },
        'utilities': {
            title: "شبكات المرافق (Utilities)",
            content: `<h3>أعمال تمديد الأنابيب</h3><p>تشمل أعمال الحفريات والردم حسب المواصفات القطرية المعتمدة لخطوط المياه والصرف.</p>`
        }
    };

    function openDetail(key) {
        const section = sectionsContent[key];
        document.getElementById('dmTitle').innerText = section.title;
        document.getElementById('dmContent').innerHTML = section.content;
        document.getElementById('detailModal').classList.add('open');
    }

    function closeModal(e) {
        if(e.target.id === 'detailModal') e.target.classList.remove('open');
    }
</script>

</body>
</html>
