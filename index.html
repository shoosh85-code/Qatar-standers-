<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل المواصفات الهندسية | Qatar Engineering Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #7A1515; --gold: #C9A84C; --dark: #0A0A0A; --dark2: #111111;
            --text: #EDE8DC; --text2: #B0A898; --border: rgba(201,168,76,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
        header { position: sticky; top:0; z-index:100; background: rgba(10,10,10,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 20px; }
        .header-inner { max-width: 1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:70px; }
        .logo-name { font-family:'Cairo',sans-serif; font-size:18px; font-weight:900; color: var(--gold); }
        .hero { max-width:1200px; margin:0 auto; padding: 40px 20px; text-align: center; }
        .hero h1 span { color: var(--gold); }
        .cats-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .cat-card { background: #181818; border: 1px solid var(--border); border-radius: 15px; padding: 20px; cursor: pointer; transition: .3s; }
        .cat-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal.active { display: block; }
        .modal-content { max-width: 800px; margin: 40px auto; background: #111; border: 1px solid var(--gold); border-radius: 15px; padding: 30px; position: relative; }
        .itp-box { background: rgba(201,168,76,0.05); border-right: 4px solid var(--gold); padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .stage-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo-name">Qatar Engineering Hub</div>
        <div style="font-size: 12px; color: var(--gold)">تم دمج كافة الأقسام (100+) ✓</div>
    </div>
</header>

<div class="hero">
    <h1>دليل <span>المواصفات القطرية</span> الشامل</h1>
    <p>المرافق، الطرق، والأسفلت - مرجعك الميداني المتكامل</p>
</div>

<div class="cats-grid" id="mainGrid">
    </div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; top:10px; left:20px; cursor:pointer; font-size:24px" onclick="closeModal()">✕</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const allData = {
        // --- قسم المرافق (الـ 64 تفصيل القديم) ---
        water: { title: "شبكة مياه الشرب", icon: "💧", itp: "فحص الضغط والتعقيم وسلامة الأنابيب.", stages: [
            { s: "التجهيزات", d: "مراجعة المخططات والجسات." }, { s: "الحفر", d: "الالتزام بأعماق QCS." }, { s: "التركيب", d: "تركيب أنابيب DI/HDPE." }, { s: "الاختبار", d: "اختبار الضغط الهيدروليكي." }
        ]},
        sewer: { title: "شبكة الصرف الصحي", icon: "🚽", itp: "اختبار الانسياب وتصوير CCTV.", stages: [
            { s: "المناهل", d: "بناء المناهل وعزلها." }, { s: "الأنابيب", d: "ضبط الميول (Slopes)." }, { s: "الاختبار", d: "اختبار الهواء والماء." }
        ]},
        storm: { title: "تصريف الأمطار", icon: "🌧️", itp: "فحص الـ Gullies والربط النهائي.", stages: [
            { s: "التجميع", d: "تركيب الـ Catch Basins." }, { s: "الأنابيب", d: "تركيب أنابيب الخرسانة RC." }
        ]},
        
        // --- قسم الطرق الجديد (الاستكمال للـ 100+) ---
        earth: { title: "الأعمال الترابية", icon: "🚜", itp: "اختبار بروكتور والكبس الميداني FDT.", stages: [
            { s: "Subgrade", d: "تجهيز وكبس طبقة القاعدة الترابية." }, { s: "الردم", d: "الردم على طبقات (Layers)." }
        ]},
        asphalt: { title: "أعمال الأسفلت", icon: "🛣️", itp: "درجة الحرارة، عينات الـ Core، ونسبة الكبس.", stages: [
            { s: "Prime Coat", d: "رش مادة MC70." }, { s: "Asphalt Base", d: "فرش طبقة الأساس الأسفلتي." }, { s: "Wearing Course", d: "الطبقة النهائية الناعمة." }
        ]},
        furniture: { title: "مكملات الطريق", icon: "🚥", itp: "استواء الكيربستون وقوة الإنترلوك.", stages: [
            { s: "Kerbstone", d: "تركيب الكيربستون والـ Backing." }, { s: "Interlock", d: "بلاط الأرصفة والرمل الناعم." }
        ]}
    };

    function init() {
        const grid = document.getElementById('mainGrid');
        for (let key in allData) {
            const item = allData[key];
            grid.innerHTML += `
                <div class="cat-card" onclick="openSection('${key}')">
                    <span style="font-size:30px">${item.icon}</span>
                    <h3 style="color:var(--gold); margin-top:10px">${item.title}</h3>
                    <p style="font-size:12px; color:var(--text2)">${item.stages.length} مراحل تنفيذية</p>
                </div>`;
        }
    }

    function openSection(key) {
        const item = allData[key];
        let html = `<h2>${item.title}</h2><br><div class="itp-box"><strong>ITP:</strong> ${item.itp}</div>`;
        item.stages.forEach(s => {
            html += `<div class="stage-item"><strong>${s.s}:</strong> <p>${s.d}</p></div>`;
        });
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('detailModal').classList.add('active');
    }

    function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
    
    init();
</script>
</body>
</html>
